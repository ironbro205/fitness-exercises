<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FITNESS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  background: #050810;
  color: white;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
  font-size: 14px;
  line-height: 1.4;
}
button {
  background: transparent;
  border: none;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
}
::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY HELPERS
   ═══════════════════════════════════════════════ */
.font-display { font-family: 'Space Grotesk', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

/* ═══════════════════════════════════════════════
   LAYOUT HELPERS
   ═══════════════════════════════════════════════ */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.items-baseline { align-items: baseline; }
.items-end { align-items: flex-end; }
.items-start { align-items: flex-start; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
.flex-shrink-0 { flex-shrink: 0; }

.gap-1 { gap: 4px; }
.gap-1\.5 { gap: 6px; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }

.grid { display: grid; }
.grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
.grid-cols-7 { grid-template-columns: repeat(7, 1fr); }

/* ═══════════════════════════════════════════════
   SPACING
   ═══════════════════════════════════════════════ */
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-5 { margin-bottom: 20px; }
.mt-0\.5 { margin-top: 2px; }
.mt-1 { margin-top: 4px; }
.mt-1\.5 { margin-top: 6px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-20 { margin-top: 80px; }
.pt-4 { padding-top: 16px; }
.pt-12 { padding-top: 48px; }
.pb-5 { padding-bottom: 20px; }
.pb-32 { padding-bottom: 128px; }
.px-1 { padding-left: 4px; padding-right: 4px; }
.px-5 { padding-left: 20px; padding-right: 20px; }
.py-1\.5 { padding-top: 6px; padding-bottom: 6px; }

/* ═══════════════════════════════════════════════
   COMPONENT: SIZES
   ═══════════════════════════════════════════════ */
.w-2 { width: 8px; }
.w-9 { width: 36px; }
.w-10 { width: 40px; }
.w-20 { width: 80px; }
.w-full { width: 100%; }
.h-2 { height: 8px; }
.h-9 { height: 36px; }
.h-10 { height: 40px; }
.h-20 { height: 80px; }
.h-px { height: 1px; }
.aspect-square { aspect-ratio: 1 / 1; }
.min-h-screen { min-height: 100vh; }
.max-w-\[240px\] { max-width: 240px; }

/* ═══════════════════════════════════════════════
   COMPONENT: COLORS & BACKGROUNDS
   ═══════════════════════════════════════════════ */
.accent { color: #00d4ff; }
.accent-bg { background: #00d4ff; }
.text-stone-200 { color: #e7e5e4; }
.text-stone-300 { color: #d6d3d1; }
.text-stone-400 { color: #a8a29e; }
.text-stone-500 { color: #6b7a99; }
.text-stone-600 { color: #4a5568; }
.bg-stone-800 { background: #1a2540; }

/* ═══════════════════════════════════════════════
   COMPONENT: TEXT SIZES
   ═══════════════════════════════════════════════ */
.text-\[9px\] { font-size: 9px; }
.text-\[10px\] { font-size: 10px; }
.text-\[11px\] { font-size: 11px; }
.text-xs { font-size: 11px; }
.text-sm { font-size: 13px; }
.text-base { font-size: 15px; }
.text-xl { font-size: 18px; }
.text-2xl { font-size: 22px; }
.text-4xl { font-size: 36px; }

/* ═══════════════════════════════════════════════
   COMPONENT: BORDERS & RADIUS
   ═══════════════════════════════════════════════ */
.rounded-full { border-radius: 9999px; }
.rounded-lg { border-radius: 12px; }
.rounded-xl { border-radius: 14px; }
.rounded-2xl { border-radius: 18px; }
.rounded-3xl { border-radius: 24px; }
.border-t { border-top: 1px solid #1a2540; }

/* ═══════════════════════════════════════════════
   STYLE HELPERS
   ═══════════════════════════════════════════════ */
.uppercase { text-transform: uppercase; }
.tracking-widest { letter-spacing: 0.1em; }
.font-bold { font-weight: 700; }
.leading-relaxed { line-height: 1.625; }

/* ═══════════════════════════════════════════════
   COMPONENT: CARDS
   ═══════════════════════════════════════════════ */
.card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 24px;
  padding: 20px;
}
.card-accent {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 24px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.card-accent::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 60%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.card-coach {
  background: linear-gradient(135deg, rgba(0,212,255,0.08) 0%, rgba(0,212,255,0.02) 100%);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 24px;
  padding: 18px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: PROGRESS BAR
   ═══════════════════════════════════════════════ */
.progress-bg {
  background: #1a2540;
  border-radius: 9999px;
  overflow: hidden;
  height: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 9999px;
  background: #00d4ff;
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
  transition: width 0.5s ease;
}

/* ═══════════════════════════════════════════════
   COMPONENT: DOTS
   ═══════════════════════════════════════════════ */
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-passed {
  background: #00d4ff;
  box-shadow: 0 0 8px #00d4ff;
}
.dot-pending {
  background: #1a2540;
}
.dot-ideal {
  background: #00d4ff;
  box-shadow: 0 0 12px #00d4ff, inset 0 0 0 2px white;
}

/* ═══════════════════════════════════════════════
   COMPONENT: COACH ICON
   ═══════════════════════════════════════════════ */
.coach-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   COMPONENT: WEEK DAY BOX
   ═══════════════════════════════════════════════ */
.day-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.day-box-empty {
  background: #050810;
  border: 1px solid #1a2540;
}
.day-box-done {
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
}
.day-box-today {
  background: #050810;
  border: 1px solid #00d4ff;
}
.today-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 8px #00d4ff;
}

/* ═══════════════════════════════════════════════
   COMPONENT: PR BADGE
   ═══════════════════════════════════════════════ */
.pr-badge {
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ═══════════════════════════════════════════════
   COMPONENT: QUICK BUTTON
   ═══════════════════════════════════════════════ */
.quick-btn {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 14px 8px;
  transition: all 0.15s;
  cursor: pointer;
  width: 100%;
}
.quick-btn:active {
  background: #1a2540;
  transform: scale(0.97);
}
.quick-btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(0, 212, 255, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  margin: 0 auto 8px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: TABBAR
   ═══════════════════════════════════════════════ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(5, 8, 16, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid #1a2540;
  padding: 10px 0 24px 0;
  z-index: 100;
  display: flex;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0;
  cursor: pointer;
  transition: color 0.2s;
  color: #4a5568;
}
.tab.active {
  color: #00d4ff;
}
.tab svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
}
.tab span {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   PLACEHOLDER ICON
   ═══════════════════════════════════════════════ */
.placeholder-icon {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  background: #0f1525;
  border: 1px solid #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  color: #4a5568;
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.animate-pulse { animation: pulse 2s ease-in-out infinite; }

/* ═══════════════════════════════════════════════
   COMPONENT: SESSION CARD (운동 메인)
   ═══════════════════════════════════════════════ */
.session-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.session-card::before {
  content: '';
  position: absolute;
  top: -20%;
  right: -10%;
  width: 50%;
  height: 140%;
  background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.session-badge {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.25);
}
.start-btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  background: #00d4ff;
  color: #050810;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.start-btn:active {
  transform: scale(0.98);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
}

/* ═══════════════════════════════════════════════
   COMPONENT: EXERCISE ITEM
   ═══════════════════════════════════════════════ */
.ex-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}
.ex-num {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════
   COMPONENT: OPTION CARD (다른 옵션)
   ═══════════════════════════════════════════════ */
.option-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  width: 100%;
}
.option-card:active {
  background: #1a2540;
  transform: scale(0.97);
}

/* ═══════════════════════════════════════════════
   COMPONENT: HISTORY ITEM
   ═══════════════════════════════════════════════ */
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #1a2540;
}
.history-row:last-child { border-bottom: none; }
.history-bar {
  width: 4px;
  height: 32px;
  border-radius: 2px;
  background: #00d4ff;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   STATS GRID
   ═══════════════════════════════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-item p:first-child {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.stat-item .stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   COMPONENT: HEADER WITH LABEL
   ═══════════════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-header p:first-child {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* SVG fill 보정 (start-btn 안의 아이콘) */
.start-btn svg { stroke: #050810; fill: #050810; }

/* ═══════════════════════════════════════════════
   추가 폰트/색 헬퍼
   ═══════════════════════════════════════════════ */
.text-5xl { font-size: 44px; }
.mb-8 { margin-bottom: 32px; }
.gap-5 { gap: 20px; }

/* ═══════════════════════════════════════════════
   COMPONENT: 운동 세션 화면
   ═══════════════════════════════════════════════ */
.session-header-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #0f1525;
  border: 1px solid #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: white;
}
.session-progress {
  background: #1a2540;
  border-radius: 9999px;
  overflow: hidden;
  height: 4px;
}
.session-progress-fill {
  height: 100%;
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
  transition: width 0.3s ease;
}

/* 세트 행 */
.set-row {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.set-row:active { transform: scale(0.99); }
.set-row.completed {
  background: rgba(0, 212, 255, 0.06);
  border-color: rgba(0, 212, 255, 0.25);
}
.set-row.active {
  border-color: #00d4ff;
  background: #0a1530;
}
.set-row.warmup {
  background: rgba(42, 53, 80, 0.4);
  border-color: #2a3550;
}

.set-label {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  background: #1a2540;
  color: #6b7a99;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.set-label.warmup-label { background: #2a3550; color: #8a99b8; }
.set-label.done {
  background: #00d4ff;
  color: #050810;
}
.set-label.active-label {
  background: rgba(0, 212, 255, 0.12);
  color: #00d4ff;
  border: 1px solid #00d4ff;
}

.set-info-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.set-info-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
}
.set-info-value {
  font-size: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  color: #d6d3d1;
}
.set-info-value.done { color: white; }
.set-info-value.active { color: #00d4ff; }
.set-info-value.pending { color: #4a5568; }

.set-status-pill {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  background: rgba(0, 212, 255, 0.15);
  padding: 4px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* 휴식 타이머 (하단 고정) */
.rest-timer-wrap {
  position: fixed;
  bottom: 72px;
  left: 0;
  right: 0;
  padding: 16px 20px 12px;
  background: linear-gradient(to top, #050810 80%, transparent);
  z-index: 99;
}
.rest-timer {
  background: #0a1530;
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 18px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rest-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
}
.rest-skip-btn {
  padding: 8px 12px;
  border-radius: 10px;
  background: #1a2540;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
}
.rest-done-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: #00d4ff;
  color: #050810;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

/* 세트 편집 시트 (하단에서 올라옴) */
.sheet-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.sheet {
  width: 100%;
  background: #0f1525;
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  padding: 16px 20px 32px;
  border-top: 1px solid #1a2540;
  animation: slideUp 0.25s ease-out;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.sheet-handle {
  width: 40px;
  height: 4px;
  background: #2a3550;
  border-radius: 9999px;
  margin: 0 auto 16px;
}

/* 큰 숫자 입력 */
.number-display {
  background: #050810;
  border: 1px solid #1a2540;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 8px;
}
.number-display p {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;

/* 조정 버튼 */
.adj-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

  background: #1a2540;
  border-radius: 12px;
  padding: 12px 0;

  font-size: 14px;
  color: white;
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.1s;
}
.adj-btn:active {
  background: #2a3550;
  transform: scale(0.96);
}
.adj-btn.accent-btn {
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff;
  border: 1px solid rgba(0, 212, 255, 0.4);
}

/* 워밍업 토글 */
.warmup-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;

  border-radius: 12px;

}
.toggle-switch {

  height: 24px;

  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch.on { background: #00d4ff; }
.toggle-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch.on .toggle-knob {
  transform: translateX(20px);
  background: #050810;
}

/* 시트 완료 버튼 */
.sheet-submit {
  width: 100%;

  border-radius: 18px;

  color: #050810;

  font-weight: 700;
  font-size: 15px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
}

.input-group { margin-bottom: 16px; }
.input-label {

  margin-bottom: 8px;
  padding: 0 4px;
}
.input-label p {

  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;

}

/* 종목 정보 카드 */

  border-radius: 18px;

  margin-bottom: 12px;
}
.exercise-gif-wrap {

}

}
.exercise-gif-placeholder {

/* 1RM 카드 */

}

/* 이전 기록 */
.prev-record {

  align-items: center;

}

/* ═══════════════════════════════════════════════

.complete-action-btn {

/* 도넛 차트 */

/* 매크로 미니 바 */

}

}

/* FAB - 플로팅 입력 버튼 */

}

}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 0 8px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.bar-shape {
  background: #1a2540;
  border-radius: 4px 4px 0 0;
  width: 100%;
  transition: all 0.3s ease;
}
.bar-shape.active {
  background: #00d4ff;
  box-shadow: 0 -2px 12px rgba(0, 212, 255, 0.4);
}
.bar-shape.partial {
  background: linear-gradient(to top, rgba(0, 212, 255, 0.5) 0%, rgba(0, 212, 255, 0.25) 100%);
}
.bar-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #4a5568;
}
.bar-value {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #d6d3d1;
}

/* PR 히스토리 아이템 */
.pr-history-item {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 14px;
  padding: 14px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 코치 채팅 화면
   ═══════════════════════════════════════════════ */
.coach-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
}
.coach-header {
  padding: 48px 20px 16px;
  border-bottom: 1px solid #0f1525;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #050810;
  position: sticky;
  top: 0;
  z-index: 10;
}
.coach-header-info {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: 12px;
}
.coach-avatar {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  flex-shrink: 0;
}
.coach-online-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 6px #00d4ff;
  display: inline-block;
}
.coach-chat-area {
  flex: 1;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 120px;
}
.coach-msg-bot {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 18px 18px 18px 4px;
  padding: 14px 16px;
  max-width: 88%;
  color: white;
  line-height: 1.55;
}
.coach-msg-bot p {
  font-size: 14px;
  white-space: pre-wrap;
}
.coach-msg-bot .msg-content strong {
  color: #00d4ff;
  font-weight: 700;
}
.coach-msg-bot .msg-content em {
  color: #a8a29e;
  font-style: italic;
}
.coach-msg-bot .msg-content code {
  background: #050810;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.coach-msg-user {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px;
  max-width: 80%;
  margin-left: auto;
  color: white;
}
.coach-quick-questions {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 0 8px 0;
  margin-bottom: 12px;
}
.coach-quick-chip {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 9999px;
  padding: 8px 14px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #b0b8d0;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
}
.coach-quick-chip:active {
  background: rgba(0, 212, 255, 0.15);
  border-color: #00d4ff;
}
.coach-input-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #050810;
  border-top: 1px solid #1a2540;
  padding: 16px 20px 32px;
  z-index: 50;
}
.coach-api-required {
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0;
}

/* ═══════════════════════════════════════════════
   COMPONENT: AI 추천 카드
   ═══════════════════════════════════════════════ */
.ai-rec-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.ai-rec-card::before {
  content: '';
  position: absolute;
  top: -20%;
  right: -10%;
  width: 50%;
  height: 140%;
  background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 9999px;
  background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.4);
}
.ai-rec-reason {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 16px;
}
.ai-rec-caution {
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.2);
  border-radius: 12px;
  padding: 10px 14px;
  margin-top: 10px;
}
.ai-rec-suggestion {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 12px;
  padding: 10px 14px;
  margin-top: 10px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 주간 리뷰 + 정체기 카드
   ═══════════════════════════════════════════════ */
.weekly-review-card {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 212, 255, 0.03) 100%);
  border: 1px solid rgba(0, 212, 255, 0.5);
  border-radius: 24px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.weekly-review-card:active { transform: scale(0.99); }
.weekly-review-card::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -20%;
  width: 60%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
  pointer-events: none;
}

.plateau-card {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(251, 191, 36, 0.02) 100%);
  border: 1px solid rgba(251, 191, 36, 0.4);
  border-radius: 24px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.plateau-card:active { transform: scale(0.99); }

.review-detail-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
  padding-bottom: 40px;
}
.review-section {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 16px 18px;
  margin-bottom: 12px;
}
.review-section.highlight {
  background: rgba(0, 212, 255, 0.06);
  border-color: rgba(0, 212, 255, 0.3);
}
.review-section.warning {
  background: rgba(251, 191, 36, 0.06);
  border-color: rgba(251, 191, 36, 0.3);
}
.review-bullet {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.55;
  color: #d6d3d1;
}
.review-bullet:last-child { margin-bottom: 0; }
.review-bullet-dot {
  flex-shrink: 0;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  margin-top: 8px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 운동 마법사 (STEP 1 부위 선택)
   ═══════════════════════════════════════════════ */

/* 스텝 인디케이터 */
.step-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
}
.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #1a2540;
  transition: all 0.2s;
}
.step-dot.active {
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
}
.step-dot.completed {
  background: rgba(0, 212, 255, 0.4);
}
.step-line {
  flex: 1;
  height: 1px;
  background: #1a2540;
}
.step-line.active { background: rgba(0, 212, 255, 0.4); }

/* 주간 기록 - 7일 막대그래프 */
.weekly-bars-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 20px;
}
.weekly-bars-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.weekly-bars-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  align-items: end;
  height: 80px;
}
.day-bar-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  height: 100%;
}
.day-bar-shape {
  width: 100%;
  background: #1a2540;
  border-radius: 4px 4px 0 0;
  transition: all 0.3s;
  position: relative;
  min-height: 6px;
}
.day-bar-shape.push { background: linear-gradient(to top, #00d4ff, #00d4ff80); }
.day-bar-shape.pull { background: linear-gradient(to top, #a78bfa, #a78bfa80); }
.day-bar-shape.legs { background: linear-gradient(to top, #fbbf24, #fbbf2480); }
.day-bar-shape.free { background: linear-gradient(to top, #6b7a99, #6b7a9980); }
.day-bar-shape.today {
  outline: 2px solid #00d4ff;
  outline-offset: 1px;
}
.day-bar-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-align: center;
}
.day-bar-label.today { color: #00d4ff; font-weight: 700; }

.weekly-legend {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #1a2540;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #b0b8d0;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* 부위 선택 카드 (큰 버튼) */
.body-part-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 24px;
  padding: 22px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.body-part-card:active { transform: scale(0.985); }
.body-part-card:hover {
  border-color: rgba(0, 212, 255, 0.3);
}

.body-part-card.recommended {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0.04) 100%);
  border: 1px solid rgba(0, 212, 255, 0.5);
}
.body-part-card.recommended::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 50%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.body-part-card.completed {
  opacity: 0.65;
}

.body-part-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  position: relative;
}

.body-part-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.body-part-name.recommended { color: #00d4ff; }

.body-part-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

.body-part-count {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.body-part-count-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: #b0b8d0;
}
.body-part-count-num.zero { color: #fbbf24; }
.body-part-count-num.done { color: #00d4ff; }
.body-part-count-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.body-part-desc {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  position: relative;
}

.recommend-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(0, 212, 255, 0.2);
  border: 1px solid rgba(0, 212, 255, 0.5);
  color: #00d4ff;
  padding: 3px 9px;
  border-radius: 9999px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  margin-bottom: 8px;
  position: relative;
}

/* ═══════════════════════════════════════════════
   COMPONENT: STEP 2 - 루틴 분석 결과
   ═══════════════════════════════════════════════ */

/* AI 분석 헤더 카드 */
.routine-analysis-card {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 212, 255, 0.02) 100%);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.routine-analysis-card::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 50%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.routine-meta-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(0, 212, 255, 0.2);
  position: relative;
}
.routine-meta-item {
  text-align: center;
}
.routine-meta-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: white;
  letter-spacing: 0.02em;
}
.routine-meta-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

/* 루틴 종목 카드 */
.routine-exercise {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 8px;
  position: relative;
  transition: all 0.15s;
}
.routine-exercise:hover {
  border-color: rgba(0, 212, 255, 0.3);
}
.routine-exercise.main {
  border-color: rgba(0, 212, 255, 0.3);
  background: linear-gradient(135deg, rgba(0,212,255,0.04) 0%, #0f1525 100%);
}
.routine-ex-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.routine-ex-num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #6b7a99;
  flex-shrink: 0;
}
.routine-ex-num.main {
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff;
  border: 1px solid rgba(0, 212, 255, 0.3);
}
.routine-ex-name {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: white;
}
.routine-ex-type {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  margin-top: 2px;
}
.routine-ex-prescription {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed #1a2540;
}
.routine-ex-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.routine-ex-stat-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.routine-ex-stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: #00d4ff;
  letter-spacing: 0.02em;
}
.routine-ex-stat-value.regular { color: white; }
.routine-ex-tag {
  display: inline-block;
  background: rgba(0, 212, 255, 0.1);
  color: #00d4ff;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  margin-left: 6px;
}

/* 액션 버튼들 (수정/시작) */
.routine-actions {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 10px;
  margin-top: 18px;
}
.routine-btn-modify {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 14px;
  padding: 14px;
  color: #b0b8d0;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.routine-btn-modify:active { transform: scale(0.98); }
.routine-btn-modify:hover { border-color: rgba(0, 212, 255, 0.3); }

.routine-btn-start {
  background: #00d4ff;
  color: #050810;
  border-radius: 14px;
  padding: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.routine-btn-start:active { transform: scale(0.98); }

/* AI 한 줄 카드 (이유, 주의 등) */
.routine-insight {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;
  padding: 12px 14px;
  margin-top: 10px;
  position: relative;
}
.routine-insight.warning {
  background: rgba(251, 191, 36, 0.06);
  border: 1px solid rgba(251, 191, 36, 0.2);
}
.routine-insight-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

/* 로딩 화면 (분석 중) */
.routine-loading-card {
  background: linear-gradient(135deg, rgba(0,212,255,0.06) 0%, rgba(0,212,255,0.01) 100%);
  border: 1px solid rgba(0, 212, 255, 0.3);
  border-radius: 24px;
  padding: 60px 30px;
  text-align: center;
}
.routine-loading-card .loading-spinner {
  width: 28px;
  height: 28px;
  border-width: 2.5px;
  margin: 0 auto 16px;
}
.routine-loading-steps {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: left;
}
.routine-loading-step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
}
.routine-loading-step.done { color: #00d4ff; }
.routine-loading-step.active { color: white; }
.routine-loading-step-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #1a2540;
}
.routine-loading-step.done .routine-loading-step-dot { background: #00d4ff; }
.routine-loading-step.active .routine-loading-step-dot { 
  background: #00d4ff;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.4); }
}

/* ═══════════════════════════════════════════════
   COMPONENT: STEP 3 - 대화 수정
   ═══════════════════════════════════════════════ */

.routine-chat-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
}

/* 상단 루틴 미리보기 (접힘/펼침) */
.routine-preview {
  background: #050810;
  border-bottom: 1px solid #1a2540;
  padding: 12px 20px;
}
.routine-preview-collapsed {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}

function fmtDate(d) {
  if (!d) d = new Date();
  var dt = new Date(d);
  return dt.getFullYear() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');
}

function daysAgo(dateStr) {
  var d = new Date(dateStr);
  var t = new Date();
  t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  var diff = Math.floor((t - d) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return diff + '일 전';
  if (diff < 30) return Math.floor(diff/7) + '주 전';
  return Math.floor(diff/30) + '개월 전';
}

  // 주간 리뷰 자동 로드 (백그라운드, 일요일)

  // 정체기 자동 체크 (백그라운드)
  if (state.apiKey && !state.plateauCheck && !state.plateauCheckLoading) {
    loadPlateauCheckIfNeeded();

  var todayMeals = data.nutritionLog.filter(function(m) { return m.date === tdStr; });

  var proteinPercent = Math.round((todayProtein / profile.proteinTarget) * 100);
  var proteinRemaining = Math.max(0, profile.proteinTarget - todayProtein);
  var thresholdPassed = todayMeals.filter(function(m) { return m.thresholdPassed; }).length;
  
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  
  var thisWeekWorkouts = data.workoutLog.filter(function(w) {
    var wd = new Date(w.date);
    return wd >= monday && wd <= today;
  });
  
  var weekDays = ['월','화','수','목','금','토','일'];
  var weekMap = {};
  thisWeekWorkouts.forEach(function(w) {
    var day = new Date(w.date).getDay();
    var idx = day === 0 ? 6 : day - 1;
    weekMap[idx] = w.sessionKr;

// AI가 추천하는 오늘 세션 (이번 주에 안 한 것 중 우선)
function getRecommendedSession() {
  var today = new Date();
  var dayOfWeek = today.getDay() || 7;
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  
  var thisWeek = state.data.workoutLog.filter(function(w) {
    var wd = new Date(w.date);
    return wd >= monday && wd <= today;
  });
  
  var done = thisWeek.map(function(w) { return w.session || w.sessionKr.toLowerCase(); });
  
  // 우선순위: PUSH → PULL → LEGS → FREE
  var priority = ['push', 'pull', 'legs', 'free'];
  for (var i = 0; i < priority.length; i++) {
    if (done.indexOf(priority[i]) === -1) return priority[i];
  }
  return 'free';
}

// 양 단위 (정규식)
var AMOUNT_PATTERNS = [
  { regex: /(\d+\.?\d*)\s*g/, unit: 'g', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*ml/, unit: 'ml', multiplier: 1 },
  { regex: /(\d+)\s*개/, unit: '개', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*인분/, unit: '인분', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*그릇/, unit: '그릇', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*공기/, unit: '공기', multiplier: 1 },
  { regex: /(\d+)\s*줄/, unit: '줄', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*스쿱/, unit: '스쿱', multiplier: 1 },
  { regex: /(\d+)\s*팩/, unit: '팩', multiplier: 1 },
  { regex: /반\s*공기/, unit: '공기', multiplier: 0.5, fixed: true },
  { regex: /반\s*인분/, unit: '인분', multiplier: 0.5, fixed: true },
  { regex: /반\s*그릇/, unit: '그릇', multiplier: 0.5, fixed: true },
  { regex: /한\s*공기/, unit: '공기', multiplier: 1, fixed: true },
  { regex: /두\s*공기/, unit: '공기', multiplier: 2, fixed: true },
  { regex: /한\s*인분/, unit: '인분', multiplier: 1, fixed: true },
  { regex: /한\s*줌/, unit: 'g', multiplier: 20, fixed: true }
];

// 음식 이름 정규화 (공백 제거 등)
function normalizeFood(name) {
  return name.replace(/\s+/g, '');
}

// DB에서 음식 찾기
function findFoodInDB(name) {
  var norm = normalizeFood(name);
  
  // 1차: 직접 매칭
  if (FOOD_DB[norm]) return { key: norm, data: FOOD_DB[norm] };
  
  // 2차: 별칭 매칭
  if (FOOD_ALIASES[norm]) {
    var aliasKey = FOOD_ALIASES[norm];
    if (FOOD_DB[aliasKey]) return { key: aliasKey, data: FOOD_DB[aliasKey] };
  }
  
  // 3차: 부분 매칭 (포함 관계)
  var dbKeys = Object.keys(FOOD_DB);
  for (var i = 0; i < dbKeys.length; i++) {
    if (norm.indexOf(dbKeys[i]) !== -1 || dbKeys[i].indexOf(norm) !== -1) {
      return { key: dbKeys[i], data: FOOD_DB[dbKeys[i]] };
    }
  }
  
  // 4차: 별칭 부분 매칭
  var aliasKeys = Object.keys(FOOD_ALIASES);
  for (var i = 0; i < aliasKeys.length; i++) {
    if (norm.indexOf(aliasKeys[i]) !== -1) {
      var aliasKey = FOOD_ALIASES[aliasKeys[i]];
      if (FOOD_DB[aliasKey]) return { key: aliasKey, data: FOOD_DB[aliasKey] };
    }
  }
  
  return null;
}

// 양 추출
function extractAmount(text, defaultData) {
  for (var i = 0; i < AMOUNT_PATTERNS.length; i++) {
    var p = AMOUNT_PATTERNS[i];
    var match = text.match(p.regex);
    if (match) {
      var value;
      if (p.fixed) {
        value = p.multiplier;
      } else {
        value = parseFloat(match[1]) * p.multiplier;
      }
      return { amount: value, unit: p.unit, defaulted: false };
    }
  }
  return { amount: defaultData.defaultAmount, unit: defaultData.unit, defaulted: true };
}

// 음식 분석 (자연어 → 영양소)
function analyzeFood(text) {
  // 음식 이름 찾기
  var found = findFoodInDB(text);
  if (!found) return null;
  
  // 양 추출
  var amountInfo = extractAmount(text, found.data);
  
  // 단위 변환
  var multiplier;
  var data = found.data;
  
  if (amountInfo.unit === data.unit) {
    multiplier = amountInfo.amount / data.defaultAmount;
  } else if (amountInfo.unit === 'g' && data.unit === 'g') {
    multiplier = amountInfo.amount / 100;
  } else {
    multiplier = amountInfo.amount / data.defaultAmount;
  }
  
  // 무게 단위인 경우 100g 기준이라는 가정
  if (data.unit === 'g' && data.defaultAmount === 100) {
    multiplier = amountInfo.amount / 100;
  }
  
  // 표시용 양 텍스트
  var amountText;
  if (amountInfo.unit === 'g' || amountInfo.unit === 'ml') {
    amountText = amountInfo.amount + amountInfo.unit;
  } else {
    amountText = amountInfo.amount + amountInfo.unit;
  }
  
  return {
    name: found.key,
    amount: amountText,
    rawAmount: amountInfo.amount,
    unit: amountInfo.unit,
    defaulted: amountInfo.defaulted,
    protein: Math.round(data.p * multiplier * 10) / 10,
    kcal: Math.round(data.kcal * multiplier),
    carbs: Math.round(data.c * multiplier * 10) / 10,
    fat: Math.round(data.f * multiplier * 10) / 10
  };
}

// 여러 음식 입력 처리 ("닭가슴살 100g + 밥 한 공기")
function analyzeFoodInput(text) {
  // 분리자: 와, 랑, +, 하고, 그리고
  var parts = text.split(/\s*(?:와|랑|이랑|\+|하고|그리고|,)\s*/);
  
  var results = [];
  var unmatched = [];
  
  parts.forEach(function(part) {
    if (!part.trim()) return;
    var result = analyzeFood(part.trim());
    if (result) {
      results.push(result);
    } else {
      unmatched.push(part.trim());
    }
  });
  
  return { matched: results, unmatched: unmatched };
}

// Haiku API 호출 (DB 매칭 실패 시)
// ═══════════════════════════════════════════════
async function analyzeFoodWithAI(text) {
  var apiKey = state.apiKey;
  if (!apiKey) return null;
  
  var systemPrompt = '당신은 한국 음식 영양 분석 전문가입니다. 사용자가 입력한 음식의 단백질(g), 칼로리(kcal), 탄수화물(g), 지방(g)을 분석해 JSON으로만 응답하세요. 양이 명시되지 않으면 일반적인 1인분 기준. 한국 음식과 양 단위(인분, 그릇, 공기, 줌 등)에 익숙합니다. 응답은 반드시 다음 형식의 JSON만 포함하세요:\n{"foods": [{"name": "음식명", "amount": "양 표시(예: 100g)", "protein": 숫자, "kcal": 숫자, "carbs": 숫자, "fat": 숫자}]}\n\n여러 음식이 있으면 foods 배열에 각각 분리. 추가 설명 금지, JSON만 출력.';
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        system: systemPrompt,
        messages: [
          { role: 'user', content: text }
        ]
      })
    });
    
    if (!response.ok) {
      var errorText = await response.text();
      console.error('API error:', response.status, errorText);
      return { error: 'API 오류 (' + response.status + ')', detail: errorText };
    }
    
    var data = await response.json();
    var content = data.content[0].text;
    
    // JSON 추출 (```json 블록 제거)
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      // JSON 추출 시도 (텍스트 중간에 JSON이 있을 경우)
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        parsed = JSON.parse(match[0]);
      } else {
        throw e;
      }
    }
    
    if (!parsed.foods || !Array.isArray(parsed.foods)) {
      return { error: '응답 형식 오류' };
    }
    
    // 형식 정규화
    return {
      foods: parsed.foods.map(function(f) {
        return {
          name: f.name || '음식',
          amount: f.amount || '1인분',
          protein: Math.round((parseFloat(f.protein) || 0) * 10) / 10,
          kcal: Math.round(parseFloat(f.kcal) || 0),
          carbs: Math.round((parseFloat(f.carbs) || 0) * 10) / 10,
          fat: Math.round((parseFloat(f.fat) || 0) * 10) / 10,
          aiAnalyzed: true
        };
      })
    };
  } catch (error) {
    console.error('AI 분석 실패:', error);
    return { error: '네트워크 오류 또는 응답 파싱 실패: ' + error.message };
  }
}

// 1RM 헬퍼 함수
// ═══════════════════════════════════════════════

// Epley 공식: 1RM = 무게 × (1 + 횟수/30)
function calculate1RM(weight, reps) {
  if (!weight || !reps) return 0;
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30) * 10) / 10;
}

// 종목명으로 1RM 조회 (별칭 자동 처리)
function get1RM(exerciseName) {
  var data = storage.get(KEYS.ONE_RM_DATA, {});
  
  // 1. 직접 매칭
  if (data[exerciseName] !== undefined) return data[exerciseName];
  
  // 2. 별칭 매칭
  var aliased = EXERCISE_ALIASES_1RM[exerciseName];
  if (aliased && data[aliased] !== undefined) return data[aliased];
  
  // 3. 역방향 별칭 매칭
  var keys = Object.keys(EXERCISE_ALIASES_1RM);
  for (var i = 0; i < keys.length; i++) {
    if (EXERCISE_ALIASES_1RM[keys[i]] === exerciseName && data[keys[i]] !== undefined) {
      return data[keys[i]];
    }
  }
  
  return null;
}

// 1RM 갱신 (더 높으면)
function update1RM(exerciseName, weight, reps) {
  if (!weight || !reps) return false;
  
  var newRM = calculate1RM(weight, reps);
  var currentRM = get1RM(exerciseName);
  
  if (currentRM !== null && newRM <= currentRM) return false;
  
  var data = storage.get(KEYS.ONE_RM_DATA, {});
  
  // 별칭 우선
  var key = EXERCISE_ALIASES_1RM[exerciseName] || exerciseName;
  data[key] = newRM;
  
  storage.set(KEYS.ONE_RM_DATA, data);
  return true; // 갱신됨
}

// 작업 무게 추천 (1RM의 N%)
function suggestWorkingWeight(exerciseName, percentage) {
  var rm = get1RM(exerciseName);
  if (!rm) return null;
  
  var pct = percentage || 0.7; // 기본 70%
  var weight = rm * pct;
  
  // 머신/덤벨에 따라 반올림
  // 덤벨: 0.5kg 단위, 머신: 2.5kg 단위 (간단히 둘 다 2.5kg)
  return Math.round(weight / 2.5) * 2.5;
}

  // INITIAL_1RM을 저장소에 복사
  var data = {};
  Object.keys(INITIAL_1RM).forEach(function(key) {
    data[key] = INITIAL_1RM[key];
  });
  
  storage.set(KEYS.ONE_RM_DATA, data);
  storage.set(KEYS.ONE_RM_INITIALIZED, true);
}

function renderWorkout() {
  // STEP 2/3는 다른 함수에서 처리, 여기는 STEP 1 (부위 선택)
  if (state.workoutWizardStep === 2) {
    return renderWorkoutStep2();
  }
  if (state.workoutWizardStep === 3) {
    return renderWorkoutStep3();
  }
  
  // STEP 1: 부위 선택
  var today = new Date();
  var dayOfWeek = today.getDay() || 7;
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  
  var thisWeek = state.data.workoutLog.filter(function(w) {
    var wd = new Date(w.date);
    return wd >= monday && wd <= sunday;
  });
  
  // 부위별 카운트
  var pushCount = thisWeek.filter(function(w) { return w.sessionKr === 'PUSH'; }).length;
  var pullCount = thisWeek.filter(function(w) { return w.sessionKr === 'PULL'; }).length;
  var legsCount = thisWeek.filter(function(w) { return w.sessionKr === 'LEGS'; }).length;
  var freeCount = thisWeek.filter(function(w) { return w.sessionKr === 'FREE'; }).length;
  
  // 추천 부위 (가장 적게 한 부위, 룰: legs < pull < push)
  var counts = { push: pushCount, pull: pullCount, legs: legsCount };
  var minCount = Math.min(pushCount, pullCount, legsCount);
  var recommended = pushCount === minCount ? 'push' 
                  : pullCount === minCount ? 'pull' 
                  : 'legs';
  // 우선순위: legs > pull > push
  if (legsCount === minCount) recommended = 'legs';
  else if (pullCount === minCount) recommended = 'pull';
  else recommended = 'push';
  
  // 7일 막대 그래프 데이터
  var dayBarsHtml = '';
  var dayLabels = ['월','화','수','목','금','토','일'];
  for (var d = 0; d < 7; d++) {
    var dayDate = new Date(monday);
    dayDate.setDate(monday.getDate() + d);
    var dayStr = dayDate.toISOString().split('T')[0];
    var todayStr = getTodayStr();
    var isToday = dayStr === todayStr;
    var isFuture = dayDate > today;
    
    // 해당 날짜의 운동
    var dayWorkouts = thisWeek.filter(function(w) { return w.date === dayStr; });
    
    var barHtml;
    if (dayWorkouts.length > 0) {
      var w = dayWorkouts[0];
      var part = w.sessionKr ? w.sessionKr.toLowerCase() : 'free';
      var heightPct = Math.min(90, 50 + (w.duration || 60) / 2);
      barHtml = '<div class="day-bar-shape ' + part + (isToday ? ' today' : '') + '" style="height: ' + heightPct + '%;"></div>';
    } else {
      var height = isFuture ? 6 : 8;
      barHtml = '<div class="day-bar-shape' + (isToday ? ' today' : '') + '" style="height: ' + height + 'px;"></div>';
    }
    
    dayBarsHtml += 
      '<div class="day-bar-col">' +
        barHtml +
        '<p class="day-bar-label' + (isToday ? ' today' : '') + '">' + dayLabels[d] + '</p>' +
      '</div>';
  }
  
  // 부위 카드 생성 헬퍼
  function partCard(key, name, koreanName, desc, count) {
    var isRecommended = key === recommended;
    var cardClass = 'body-part-card' + (isRecommended ? ' recommended' : '') + (count >= 2 ? ' completed' : '');
    var countClass = count === 0 ? 'zero' : (count >= 2 ? 'done' : '');
    
    return '<div class="' + cardClass + '" onclick="selectBodyPart(\'' + key + '\')">' +
      (isRecommended ? '<span class="recommend-badge">✨ 추천</span>' : '') +
      '<div class="body-part-header">' +
        '<p class="body-part-name' + (isRecommended ? ' recommended' : '') + '">' + name + '</p>' +
        '<div class="body-part-count">' +
          '<p class="body-part-count-num ' + countClass + '">' + count + '</p>' +
          '<p class="body-part-count-label">이번 주</p>' +
        '</div>' +
      '</div>' +
      '<p class="body-part-desc">' + koreanName + ' · ' + desc + '</p>' +
    '</div>';
  }
  
  return '' +
    // 헤더
    '<div class="px-5 pt-12 pb-5">' +
      '<p class="text-xs uppercase font-mono text-stone-500 mb-2" style="letter-spacing: 0.3em;">WORKOUT</p>' +
      '<h1 class="font-bebas text-4xl">오늘 운동</h1>' +
    '</div>' +
    
    '<div class="px-5 pb-32">' +
      
      // 스텝 인디케이터
      '<div class="step-indicator">' +
        '<div class="step-dot active"></div>' +
        '<div class="step-line"></div>' +
        '<div class="step-dot"></div>' +
        '<div class="step-line"></div>' +
        '<div class="step-dot"></div>' +
        '<p class="text-[10px] font-mono accent ml-2">STEP 1 · 부위 선택</p>' +
      '</div>' +
      
      // 주간 기록 (7일 막대)
      '<div class="weekly-bars-card">' +
        '<div class="weekly-bars-header">' +
          '<div>' +
            '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-1">이번 주 기록</p>' +
            '<p class="font-bebas text-2xl">' + thisWeek.length + '<span class="text-sm text-stone-500"> / ' + state.profile.workoutFreq + '회</span></p>' +
          '</div>' +
          '<div class="text-right">' +
            '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-1">목표 달성</p>' +
            '<p class="font-bebas text-2xl accent">' + Math.round((thisWeek.length / state.profile.workoutFreq) * 100) + '<span class="text-sm text-stone-500">%</span></p>' +
          '</div>' +
        '</div>' +
        '<div class="weekly-bars-grid">' + dayBarsHtml + '</div>' +
        '<div class="weekly-legend">' +
          '<div class="legend-item"><div class="legend-dot" style="background: #00d4ff;"></div>PUSH</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #a78bfa;"></div>PULL</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #fbbf24;"></div>LEGS</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #6b7a99;"></div>FREE</div>' +
        '</div>' +
      '</div>' +
      
      // 부위 선택
      '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-3 px-1">오늘 어느 부위를 할까요?</p>' +
      
      partCard('push', 'PUSH', '가슴 · 어깨 · 삼두', '밀기 동작', pushCount) +
      partCard('pull', 'PULL', '등 · 이두', '당기기 동작', pullCount) +
      partCard('legs', 'LEGS', '하체 · 코어', '레그 데이', legsCount) +
      partCard('free', 'FREE', '자유 구성', '직접 종목 선택', freeCount) +
      
    '</div>';
}

window.selectBodyPart = async function(part) {
  state.selectedBodyPart = part;
  state.generatedRoutine = null;
  
  // FREE는 STEP 3 (대화형)로 바로 이동 — 빈 루틴부터 대화로 채워감
  if (part === 'free') {
    state.workoutWizardStep = 3;
    state.routineLoading = false;
    state.routineChatHistory = [];
    state.routineChatInput = '';
    state.routinePreviewExpanded = false;
    
    // 빈 루틴 초기화
    state.generatedRoutine = {
      bodyPart: 'free',
      headline: '자유 루틴 구성 중',
      duration: 60,
      totalSets: 0,
      intensity: 'moderate',
      caution: '',
      exercises: [],
      isFree: true
    };
    
    // AI 첫 메시지
    state.routineChatHistory = [
      {
        role: 'assistant',
        content: '오늘 어떤 운동을 하고 싶으세요? 자유롭게 말씀해주세요.\n\n예를 들어:\n· "어깨 위주로 30분만"\n· "가슴 + 이두 같이"\n· "오늘은 가볍게 풀바디"\n· "1RM의 70% 정도로 6종목"\n\n원하는 부위, 시간, 강도를 알려주시면 루틴을 제안할게요. [✓ 적용하기] 버튼으로 반영됩니다.'
      }
    ];
    
    render();
    setTimeout(function() {
      var input = document.getElementById('rc-input');
      if (input) input.focus();
    }, 100);
    return;
  }
  
  // 정형 (PUSH/PULL/LEGS): STEP 2 → AI 루틴 생성
  state.workoutWizardStep = 2;
  state.routineLoading = true;
  render();
  
  if (!state.apiKey) {
    // API 키 없을 시 폴백 (SESSIONS에서 가져오기)
    var fallback = SESSIONS[part];
    state.generatedRoutine = {
      bodyPart: part,
      headline: fallback.description,
      reason: 'API 키가 설정되지 않아 기본 루틴을 표시합니다. 더보기에서 키를 설정하면 AI가 1RM 기반으로 맞춤 루틴을 만들어줍니다.',
      duration: fallback.duration,
      totalSets: fallback.setCount,
      intensity: 'moderate',
      caution: '',
      exercises: fallback.exercises.map(function(ex) {
        return {
          name: ex.name,
          type: ex.type,
          isMain: false,
          sets: ex.sets,
          reps: ex.reps,
          weight: ex.lastWeight,
          rir: 2,
          note: ''
        };
      }),
      isFallback: true
    };
    state.routineLoading = false;
    render();
    return;
  }
  
  // AI 루틴 생성
  var routine = await generateFullRoutine(part);
  
  if (routine && !routine.error) {
    state.generatedRoutine = routine;
  } else {
    state.generatedRoutine = { 
      error: routine ? routine.error : '루틴 생성 실패',
      bodyPart: part 
    };
  }
  
  state.routineLoading = false;
  render();
};

  if (!state.selectedBodyPart) return;
  state.routineLoading = true;

};

    '- changes는 변경 내역 요약.\n' +
    '- updatedRoutine은 변경이 반영된 전체 루틴 (미리보기용).\n' +
    '- 변경 필요 없으면 reply만 채우고 changes는 빈 배열, updatedRoutine은 null.\n' +
    '- FREE 모드에서 빈 루틴에 첫 종목 추가 시 6~7개로 완전 구성.\n\n' +
    
    '## 현재 루틴\n' +
    JSON.stringify({
      headline: currentRoutine.headline,
      bodyPart: currentRoutine.bodyPart,
      isFree: isFree,
      exercises: currentRoutine.exercises
    }, null, 2) + '\n\n' +
    
    '## 사용자 데이터\n' + context;
  
  // 대화 이력 포함
  var messages = chatHistory.slice(-10).map(function(m) {
    return { role: m.role, content: m.content };
  });
  
  // 마지막 사용자 메시지 추가
  messages.push({ role: 'user', content: userRequest });
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2048,
        system: systemPrompt,
        messages: messages
      })
    });
    
    if (!response.ok) {
      return { error: 'API 오류 (' + response.status + ')' };
    }
    
    var data = await response.json();
    var content = data.content[0].text;
    
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else return { error: 'JSON 파싱 실패' };
    }
    
    return {
      reply: parsed.reply || '',
      changes: Array.isArray(parsed.changes) ? parsed.changes : [],
      updatedRoutine: parsed.updatedRoutine || null
    };
  } catch (error) {
    return { error: error.message };
  }
}

window.sendRoutineModification = async function() {
  if (state.routineChatThinking) return;
  
  var text = state.routineChatInput.trim();
  if (!text) {
    var input = document.getElementById('rc-input');
    if (input) text = input.value.trim();
    if (!text) return;
  }
  
  // 사용자 메시지 추가
  state.routineChatHistory.push({ role: 'user', content: text });
  state.routineChatInput = '';
  state.routineChatThinking = true;
  render();
  scrollRoutineChatToBottom();
  
  if (!state.apiKey) {
    state.routineChatHistory.push({
      role: 'assistant',
      content: '⚠️ API 키가 필요해요. 더보기 > Anthropic API 키에서 설정해주세요.'
    });
    state.routineChatThinking = false;
    render();
    scrollRoutineChatToBottom();
    return;
  }
  
  // AI 수정 요청
  var result = await modifyRoutineWithAI(
    state.generatedRoutine,
    text,
    state.routineChatHistory.slice(0, -1) // 마지막 user 메시지 제외 (위에서 별도 전달)
  );
  
  state.routineChatThinking = false;
  
  if (result.error) {
    state.routineChatHistory.push({
      role: 'assistant',
      content: '⚠️ 수정 실패: ' + result.error
    });
  } else {
    // 봇 답변 + 변경 카드 + 대기 중인 변경안 (자동 적용 X)
    state.routineChatHistory.push({
      role: 'assistant',
      content: result.reply,
      changes: result.changes,
      pendingRoutine: result.updatedRoutine,  // 사용자 승인 대기
      approvalStatus: result.updatedRoutine ? 'pending' : null  // pending | applied | cancelled
    });
    // 루틴은 자동 업데이트 X - 사용자가 [적용] 눌러야 반영
  }
  
  render();
  scrollRoutineChatToBottom();
};

function scrollRoutineChatToBottom() {
  setTimeout(function() {
    var area = document.getElementById('rc-area');
    if (area) area.scrollTop = area.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }, 80);
}

// 변경안 적용
window.approveRoutineChange = function(msgIdx) {
  var msg = state.routineChatHistory[msgIdx];
  if (!msg || !msg.pendingRoutine) return;
  
  var pr = msg.pendingRoutine;
  state.generatedRoutine = Object.assign({}, state.generatedRoutine, {
    headline: pr.headline || state.generatedRoutine.headline,
    duration: pr.duration || state.generatedRoutine.duration,
    totalSets: pr.totalSets || state.generatedRoutine.totalSets,
    intensity: pr.intensity || state.generatedRoutine.intensity,
    exercises: pr.exercises || state.generatedRoutine.exercises,
    wasModified: true
  });
  
  msg.approvalStatus = 'applied';
  render();
};

// 생성된 루틴으로 운동 세션 시작
window.startGeneratedRoutine = function() {
  if (!state.generatedRoutine || !state.generatedRoutine.exercises || state.generatedRoutine.exercises.length === 0) {
    alert('종목이 없어요. 먼저 추가해주세요.');
    return;
  }
  
  var r = state.generatedRoutine;
  var sessionType = r.bodyPart;
  // FREE는 SESSIONS에 없으므로 임시 sessionData 생성
  var sessionData = SESSIONS[sessionType] || {
    name: 'FREE',
    description: r.headline || '자유 구성 루틴',
    duration: r.duration || 60,
    setCount: r.totalSets || r.exercises.length * 3
  };
  
  // 종목 데이터를 운동 세션 형식으로 변환
  var exercises = r.exercises.map(function(ex, idx) {
    var sets = [];
    
    // 워밍업 1세트 (메인 종목만)
    if (ex.isMain) {
      sets.push({
        weight: ex.weight ? Math.round((ex.weight * 0.5) / 2.5) * 2.5 : null,
        reps: 10,
        completed: false,
        isWarmup: true
      });
    }
    
    // 본 세트
    for (var s = 0; s < (ex.sets || 3); s++) {
      sets.push({
        weight: ex.weight || null,
        reps: parseInt(String(ex.reps).split('-')[0]) || 8,
        completed: false,
        isWarmup: false
      });
    }
    
    return {
      name: ex.name,
      type: ex.type || '보조',
      sets: sets,
      reps: ex.reps,
      lastWeight: ex.weight,
      reps_done: ex.reps,
      note: ex.note
    };
  });
  
  state.activeSession = {
    sessionType: sessionType,
    sessionName: sessionData.name || sessionType.toUpperCase(),
    sessionKr: sessionData.name || sessionType.toUpperCase(),
    exercises: exercises,
    currentExerciseIdx: 0,
    startTime: Date.now(),
    isGenerated: true,
    routineMeta: {
      headline: r.headline,
      reason: r.reason
    }
  };
  
  // 마법사 상태 리셋
  state.workoutWizardStep = 1;
  state.generatedRoutine = null;
  state.selectedBodyPart = null;
  state.routineChatHistory = [];
  state.routineChatInput = '';
  state.routinePreviewExpanded = false;
  
  render();
};

// 운동 세션 시작
// ═══════════════════════════════════════════════
window.startSession = function(sessionType) {
  var sessionData = SESSIONS[sessionType];
  if (!sessionData || !sessionData.exercises || sessionData.exercises.length === 0) {
    alert('자유 운동은 다음 단계에서 구현됩니다');
    return;
  }
  
  // 세션 데이터 초기화
  var exercises = sessionData.exercises.map(function(ex) {
    var sets = [];
    // 워밍업 1세트 + 본 세트 3개
    sets.push({ 
      weight: ex.lastWeight ? Math.round(ex.lastWeight * 0.5) : null, 
      reps: 10, 
      isWarmup: true, 
      completed: false 
    });
    for (var i = 0; i < ex.sets; i++) {
      sets.push({ 
        weight: ex.lastWeight, 
        reps: parseInt(ex.reps.split('-')[0]) || 10, 
        isWarmup: false, 
        completed: false 
      });
    }
    return {
      name: ex.name,
      type: ex.type,
      targetReps: ex.reps,
      lastWeight: ex.lastWeight,
      lastReps: ex.reps_done,
      sets: sets
    };
  });
  
  state.activeSession = {
    sessionType: sessionType,
    sessionName: sessionData.name,
    startTime: Date.now(),
    currentExerciseIdx: 0,
    exercises: exercises
  };
  
  render();
};

// 세션 종료
window.endSession = function() {
  // 종료 확인 (운동 중인 세트 있으면)
  var hasCompleted = false;
  if (state.activeSession) {
    state.activeSession.exercises.forEach(function(ex) {
      ex.sets.forEach(function(s) { if (s.completed && !s.isWarmup) hasCompleted = true; });
    });
  }
  
  if (!hasCompleted) {
    // 완료한 본 세트가 없으면 그냥 취소
    if (!confirm('운동을 취소하시겠어요? 기록이 저장되지 않습니다.')) return;
    state.activeSession = null;
    state.restTimer = null;
    state.editingSet = null;
    if (restTickerInterval) { clearInterval(restTickerInterval); restTickerInterval = null; }
    render();
    return;
  }
  
  // 완료 화면 표시 (저장 + PR 감지는 화면 진입 시)
  finalizeSession();
};

// 세션 마무리: 통계 계산 + 저장 + 완료 화면
function finalizeSession() {
  var session = state.activeSession;
  var endTime = Date.now();
  var durationMin = Math.floor((endTime - session.startTime) / 60000);
  
  // 완료된 본 세트만 카운트
  var completedSets = 0;
  var exercisesDone = [];
  var newPRs = [];
  
  session.exercises.forEach(function(ex) {
    var doneSets = ex.sets.filter(function(s) { return s.completed && !s.isWarmup; });
    if (doneSets.length > 0) {
      completedSets += doneSets.length;
      
      // 종목별 요약
      var weights = doneSets.map(function(s) { return s.weight; });
      var reps = doneSets.map(function(s) { return s.reps; });
      var maxWeight = Math.max.apply(null, weights);
      
      exercisesDone.push({
        name: ex.name,
        type: ex.type,
        sets: doneSets.length,
        weights: weights,
        reps: reps,
        maxWeight: maxWeight,
        lastWeight: ex.lastWeight,
        lastReps: ex.lastReps
      });
      
      // PR 감지
      if (ex.lastWeight !== null && maxWeight > ex.lastWeight) {
        newPRs.push({
          id: 'pr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
          exerciseName: ex.name,
          weight: maxWeight,
          reps: reps[weights.indexOf(maxWeight)],
          previousWeight: ex.lastWeight,
          date: new Date().toISOString().split('T')[0]
        });
      }
      // 체중 운동 (풀업 등)
      if (ex.lastWeight === null && ex.lastReps && reps[0] > ex.lastReps) {
        newPRs.push({
          id: 'pr_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
          exerciseName: ex.name,
          reps: reps[0],
          previousReps: ex.lastReps,
          date: new Date().toISOString().split('T')[0]
        });
      }
    }
  });
  
  // workoutLog에 추가
  var newWorkout = {
    id: 'w_' + Date.now(),
    date: new Date().toISOString().split('T')[0],
    session: session.sessionType,
    sessionKr: session.sessionName,
    duration: durationMin,
    exercises: exercisesDone.length,
    sets: completedSets,
    completed: true,
    exercisesData: exercisesDone
  };
  
  state.data.workoutLog.unshift(newWorkout);
  storage.set(KEYS.WORKOUT_LOG, state.data.workoutLog);
  
  // PR 추가
  if (newPRs.length > 0) {
    newPRs.forEach(function(pr) {
      state.data.personalRecords.unshift(pr);
    });
    storage.set(KEYS.PERSONAL_RECORDS, state.data.personalRecords);
  }
  
  // 완료 화면용 데이터 저장
  state.completedSession = {
    sessionName: session.sessionName,
    duration: durationMin,
    exerciseCount: exercisesDone.length,
    setCount: completedSets,
    exercises: exercisesDone,
    newPRs: newPRs,
    date: new Date()
  };
  
  // 세션 정리
  state.activeSession = null;
  state.restTimer = null;
  state.editingSet = null;
  if (restTickerInterval) { clearInterval(restTickerInterval); restTickerInterval = null; }
  
  render();
}

// 완료 화면 → 홈으로
window.goHome = function() {
  state.completedSession = null;
  state.currentTab = 'home';
  render();
};

// 완료 화면 → 운동 메인으로
window.goToWorkout = function() {
  state.completedSession = null;
  state.currentTab = 'workout';
  render();
};

// 세트 클릭 → 편집 시트 열기
window.openSetEditor = function(exerciseIdx, setIdx) {
  state.editingSet = { exerciseIdx: exerciseIdx, setIdx: setIdx };
  render();
};

window.closeSetEditor = function() {
  state.editingSet = null;
  render();
};

// 무게/횟수 조정
window.adjustWeight = function(delta) {
  if (!state.editingSet) return;
  var s = state.editingSet;
  var set = state.activeSession.exercises[s.exerciseIdx].sets[s.setIdx];
  set.weight = Math.max(0, (set.weight || 0) + delta);
  render();
};

window.adjustReps = function(delta) {
  if (!state.editingSet) return;
  var s = state.editingSet;
  var set = state.activeSession.exercises[s.exerciseIdx].sets[s.setIdx];
  set.reps = Math.max(0, (set.reps || 0) + delta);
  render();
};

window.toggleWarmup = function() {
  if (!state.editingSet) return;
  var s = state.editingSet;
  var set = state.activeSession.exercises[s.exerciseIdx].sets[s.setIdx];
  set.isWarmup = !set.isWarmup;
  render();
};

// 세트 완료 → 휴식 타이머 시작
window.completeSet = function() {
  if (!state.editingSet) return;
  var s = state.editingSet;
  var exercise = state.activeSession.exercises[s.exerciseIdx];
  var set = exercise.sets[s.setIdx];
  set.completed = true;
  
  // 1RM 자동 갱신 (워밍업 세트 제외)
  if (!set.isWarmup && set.weight && set.reps) {
    var updated = update1RM(exercise.name, set.weight, set.reps);
    if (updated) {
      set.is1RMUpdate = true; // PR 표시용
    }
  }
  
  // 휴식 시간 결정 (복합 vs 고립)
  var isCompound = ['프레스', '풀업', '랫풀다운', '로우', '스쿼트', '데드리프트', '레그 프레스', '핵 스쿼트'].some(function(k) {
    return exercise.name.indexOf(k) !== -1;
  });
  var restDuration = set.isWarmup ? 60 : (isCompound ? 150 : 90); // 워밍업 1분, 복합 2.5분, 고립 1.5분
  
  state.restTimer = {
    startTime: Date.now(),
    duration: restDuration,
    exerciseIdx: s.exerciseIdx,
    setIdx: s.setIdx
  };
  state.editingSet = null;
  
  render();
  startRestTimerTick();
};

// 휴식 스킵
window.skipRest = function() {
  state.restTimer = null;
  render();
};

// 휴식 +30초
window.addRestTime = function() {
  if (state.restTimer) {
    state.restTimer.duration += 30;
    render();
  }
};

// 휴식 타이머 tick
var restTickerInterval = null;
function startRestTimerTick() {
  if (restTickerInterval) clearInterval(restTickerInterval);
  restTickerInterval = setInterval(function() {
    if (!state.restTimer) {
      clearInterval(restTickerInterval);
      restTickerInterval = null;
      return;
    }
    var elapsed = Math.floor((Date.now() - state.restTimer.startTime) / 1000);
    if (elapsed >= state.restTimer.duration) {
      // 시간 다 됨 - 알림 (진동)
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      state.restTimer = null;
      clearInterval(restTickerInterval);
      restTickerInterval = null;
    }
    render();
  }, 1000);
}

// 종목 변경
window.goToExercise = function(idx) {
  if (state.activeSession) {
    state.activeSession.currentExerciseIdx = idx;
    render();
  }
};
