    '  "caution": "주의사항 (1문장, 없으면 빈 문자열)",\n' +
    '  "suggestion": "메인 종목 무게/횟수 제안 (1문장, 사용자의 1RM 기반)",\n' +
    '  "intensity": "light" | "moderate" | "challenging"\n' +
    '}\n\n' +
    
    '## 사용자 데이터\n' + context;
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 512,
        system: systemPrompt,
        messages: [
          { role: 'user', content: '오늘 어떤 운동을 해야 할까요? 사용자 데이터 기반으로 분석해서 JSON으로만 답하세요.' }
        ]
      })
    });
    
    if (!response.ok) {
      console.error('AI 추천 실패:', response.status);
      return null;
    }
    
    var data = await response.json();
    if (!data || !Array.isArray(data.content) || data.content.length === 0 || !data.content[0].text) {
      return null;
    }
    var content = data.content[0].text;
    
    // JSON 추출
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        parsed = JSON.parse(match[0]);
      } else {
        return null;
      }
    }
    
    // 유효성 검증
    var validSessions = ['push', 'pull', 'legs', 'free'];
    if (!validSessions.includes(parsed.session)) {
      console.error('잘못된 session:', parsed.session);
      return null;
    }
    
    var result = {
      session: parsed.session,
      title: parsed.title || '',
      reason: parsed.reason || '',
      caution: parsed.caution || '',
      suggestion: parsed.suggestion || '',
      intensity: parsed.intensity || 'moderate',
      date: todayStr,
      aiGenerated: true
    };
    
    // 캐시 저장
    storage.set(KEYS.AI_RECOMMENDATION, result);
    
    return result;
  } catch (error) {
    console.error('AI 추천 호출 실패:', error);
    return null;
  }
}

// ═══════════════════════════════════════════════
// 전체 루틴 생성 (STEP 2 - 부위 선택 후)
// 사용자가 부위 선택 → 6~7개 종목으로 구성된 완전한 루틴 생성
// ═══════════════════════════════════════════════
async function generateFullRoutine(bodyPart) {
  if (!state.apiKey) return null;
  
  // FREE 모드는 전체 컨텍스트, PUSH/PULL/LEGS는 해당 부위만 (토큰 절약)
  var context = buildUserContext(bodyPart !== 'free' ? { focusBodyPart: bodyPart } : {});
  
  // 부위별 영문 매핑
  var partInfo = {
    push: { name: 'PUSH', kor: '가슴/어깨/삼두', muscles: '대흉근, 전면/측면 삼각근, 삼두근' },
    pull: { name: 'PULL', kor: '등/이두', muscles: '광배근, 능형근, 후면 삼각근, 이두근' },
    legs: { name: 'LEGS', kor: '하체/코어', muscles: '대퇴사두, 햄스트링, 둔근, 종아리, 코어' },
    free: { name: 'FREE', kor: '자유', muscles: '사용자 선택' }
  };
  var info = partInfo[bodyPart];
  
  // 종목 풀 동적 생성 (EXERCISE_BODY_PART_MAP에서 자동 추출)
  function getExercisePoolFor(bp) {
    // shoulders_rear은 PULL 전용 (PUSH 종목 풀에서 제외) - 의도된 분류
    // 가슴/어깨/삼두 = PUSH / 등/후면어깨/이두 = PULL / 하체/코어 = LEGS
    var partKeysByGroup = {
      push: ['chest', 'chest_upper', 'chest_lower', 'shoulders_front', 'shoulders_side', 'triceps'],
      pull: ['lats', 'upper_back', 'traps', 'shoulders_rear', 'biceps'],
      legs: ['quads', 'hamstrings', 'glutes', 'glutes_med', 'calves', 'adductors', 'abs', 'obliques']
    };
    var targetParts = partKeysByGroup[bp] || [];
    var byPart = {};
    var addedNames = {};
    var oneRMData = storage.get(KEYS.ONE_RM_DATA, {});
    
    // 1. EXERCISE_BODY_PART_MAP 종목들
    Object.keys(EXERCISE_BODY_PART_MAP).forEach(function(name) {
      var info = EXERCISE_BODY_PART_MAP[name];
      if (targetParts.indexOf(info.primary) === -1) return;
      var partKr = BODY_PART_KR[info.primary] || info.primary;
      if (!byPart[partKr]) byPart[partKr] = [];
      var tags = [];
      if (info.compound) tags.push('복합');
      else tags.push('고립');
      if (info.stretched) tags.push('신장강조');
      if (info.angle) tags.push(info.angle);
      
      // 1RM 정보 추가 (직접 또는 추정)
      // confidence 'medium' 이상만 표시 (low/very_low는 표본 부족으로 신뢰 X)
      var rmInfo = '';
      if (oneRMData[name]) {
        rmInfo = ', 1RM ' + Math.round(oneRMData[name]) + 'kg';
      } else {
        var est = estimate1RMFromPart(name);
        if (est && est.source === 'estimated_from_part' && est.confidence === 'medium') {
          rmInfo = ', 추정 1RM ~' + est.weight + 'kg (' + est.basedOn + ')';
        }
      }
      
      byPart[partKr].push(name + ' [' + tags.join('/') + rmInfo + ']');
      addedNames[name] = true;
    });
    
    // 2. 사용자가 1RM 등록한 종목 중 매핑 외 (퍼지 매칭)
    Object.keys(oneRMData).forEach(function(name) {
      if (addedNames[name]) return;
      var info = getExercisePart(name);
      if (!info) return;
      if (targetParts.indexOf(info.primary) === -1) return;
      var partKr = BODY_PART_KR[info.primary] || info.primary;
      if (!byPart[partKr]) byPart[partKr] = [];
      var tags = ['사용자종목'];
      if (info.compound) tags.push('복합');
      else tags.push('고립');
      byPart[partKr].push(name + ' [' + tags.join('/') + ', 1RM ' + Math.round(oneRMData[name]) + 'kg]');
      addedNames[name] = true;
    });
    
    var lines = [];
    Object.keys(byPart).forEach(function(p) {
      lines.push('- ' + p + ': ' + byPart[p].join(', '));
    });
    return lines.join('\n');
  }
  
  var systemPrompt = '당신은 과학적 근거 기반 피트니스 코치다. ' +
    info.name + ' (' + info.kor + ') 루틴 5~7개 종목 생성. JSON으로만 응답.\n' +
    
    '═════════════════════════════════════\n' +
    '📋 [데이터] 사용자 컨텍스트\n' +
    '═════════════════════════════════════\n' +
    context + '\n' +
    
    '═════════════════════════════════════\n' +
    '🏋️ [데이터] ' + info.name + ' 사용 가능 종목 풀\n' +
    '═════════════════════════════════════\n' +
    getExercisePoolFor(bodyPart) + '\n\n' +
    
    '═════════════════════════════════════\n' +
    '⚖️ [규칙] 루틴 구성 원칙\n' +
    '═════════════════════════════════════\n' +
    
    '## 핵심 원칙 (사용자 데이터 + 과학 근거)\n' +
    '1. **부족 부위 우선 보충** — 컨텍스트 "부족 부위" 리스트의 부위를 메인/고립으로 1~2개 포함\n' +
    '2. **부위별 1~3개** (4개 이상 = 과잉) / 동일 부위·각도 중복 금지\n' +
    '3. **메인 1~2개** (isMain: true, 복합, 첫 1~2번째) + **신장 강조 최소 1개**\n' +
    '4. **순서**: 메인 복합 → 보조 복합 → 고립 → 신장 강조 → 펌프\n' +
    '5. **무게**: 위 "추천 작업 무게" 표 그대로 사용 (메인=메인값, 보조=보조값, 고립=고립값)\n' +
    '6. 1RM 없는 종목 → weight: null (사용자가 측정)\n' +
    '7. 정체기(🔥) 표시된 종목은 무게 +2.5kg 도전 또는 종목 교체 제안\n' +
    '8. **횟수 (type별 필수 가이드)**:\n' +
    '   - 메인 복합 (isMain:true, type:"복합"): "5-8" 또는 "6-8"\n' +
    '   - 보조 복합 (type:"보조"): "8-10" 또는 "8-12"\n' +
    '   - 고립 일반 (type:"고립"): "10-15"\n' +
    '   - 소근육 고립 (사이드/리어 레터럴 레이즈, 페이스 풀, 푸시다운, 컬류, 카프 레이즈, 힙 어덕션 등): "12-20"\n' +
    '   ※ 가벼운 무게·다회수가 적절한 종목을 무겁게 적은 횟수로 추천 금지\n' +
    '9. **컨디션 반영**: 컨텍스트 "컨디션 추이"가 있으면 강도 조절 (buildUserContext 분류와 동일)\n' +
    '   - 평균 RPE ≥ 8.5 또는 컨디션 ≤ 2 = 회복 모드 (RIR 3~4, 볼륨 -20%, intensity:"light")\n' +
    '   - 평균 RPE 7~8.4 또는 컨디션 3 = 평상시 (intensity:"moderate")\n' +
    '   - 평균 RPE < 7 + 컨디션 4~5 = 도전 가능 (intensity:"challenging")\n' +
    '   - 컨디션 데이터 3회 미만은 표본 부족, 평상시 처리\n\n' +
    
    '## 🧬 과학 근거\n' +
    '부위당 주 10~20세트 (Pelland 2024) / RIR 1~3 (Refalo) / 5~30회 모두 유효 (IUSCA 2021) / 신장강조 우월 (Maeo 2023) / 머신=프리웨이트 (Schwanbeck) / 휴식 복합 2~3분\n\n' +
    
    '## ❌ 절대 금지\n' +
    '- 한 부위 4개 이상 / 동일 부위·각도 2개 이상 / 메인 0개 / 신장 강조 0개\n' +
    '- 사용자 부족 부위 무시 / 풀에 없는 종목 사용\n\n' +
    
    '## 응답 형식 (JSON만)\n' +
    '{\n' +
    '  "headline": "한 줄 (예: PUSH 어깨 측면 보충)",\n' +
    '  "reason": "왜 (부족 부위 인용 필수, 2~3문장)",\n' +
    '  "duration": 60, "totalSets": 18, "intensity": "moderate", "caution": "",\n' +
    '  "exercises": [{"name":"종목","type":"복합|고립|보조","isMain":bool,"sets":3,"reps":"8-10","weight":150,"rir":2,"note":"이유+근거"}]\n' +
    '}\n\n' +
    
    '## 응답 전 체크\n' +
    '☐ 부족 부위 포함? ☐ 한 부위 4개 미만? ☐ 메인 1~2개? ☐ 신장 강조 1개+? ☐ 무게는 위 표 그대로?';
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2048,
        system: systemPrompt,
        messages: [
          { role: 'user', content: info.name + ' 루틴을 만들어주세요. JSON으로만 답하세요.' }
        ]
      })
    });
    
    if (!response.ok) {
      console.error('루틴 생성 실패:', response.status);
      return { error: 'API 오류 (' + response.status + ')' };
    }
    
    var data = await response.json();
    if (!data || !Array.isArray(data.content) || data.content.length === 0 || !data.content[0].text) {
      return { error: 'AI 응답이 비어있어요. 다시 시도해주세요.' };
    }
    var content = data.content[0].text;
    
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else return { error: 'JSON 파싱 실패' };
    }
    
    if (!Array.isArray(parsed.exercises) || parsed.exercises.length === 0) {
      return { error: '종목 목록이 없습니다' };
    }
    
    return {
      bodyPart: bodyPart,
      headline: parsed.headline || (info.name + ' 루틴'),
      reason: parsed.reason || '',
      duration: parsed.duration || 60,
      totalSets: parsed.totalSets || parsed.exercises.reduce(function(s, e) { return s + (e.sets || 3); }, 0),
      intensity: parsed.intensity || 'moderate',
      caution: parsed.caution || '',
      exercises: parsed.exercises.map(function(ex) {
        return {
          name: ex.name || '종목',
          type: ex.type || '보조',
          isMain: !!ex.isMain,
          sets: ex.sets || 3,
          reps: ex.reps || '8-12',
          weight: ex.weight || null,
          rir: ex.rir || 2,
          note: ex.note || ''
        };
      }),
      generatedAt: new Date().toISOString()
    };
  } catch (error) {
    console.error('루틴 생성 호출 실패:', error);
    return { error: error.message };
  }
}

// ═══════════════════════════════════════════════
// 주간 리뷰 (Sonnet 4.6) - 일요일 자동 트리거
// ═══════════════════════════════════════════════

// 주차 식별자 (예: "2026-W21")
function getWeekId(date) {
  var d = new Date(date);
  d.setHours(0, 0, 0, 0);
  // ISO 주: 목요일 기준
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  var year = d.getFullYear();
  var firstDay = new Date(year, 0, 1);
  var weekNum = Math.ceil((((d - firstDay) / 86400000) + 1) / 7);
  return year + '-W' + String(weekNum).padStart(2, '0');
}

// 이번 주 데이터 수집
function collectWeekData() {
  var today = new Date();
  var dayOfWeek = today.getDay() || 7;
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0, 0, 0, 0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  
  var weekWorkouts = state.data.workoutLog.filter(function(w) {
    var d = new Date(w.date);
    return d >= monday && d <= sunday;
  });
  
  var weekMeals = state.data.nutritionLog.filter(function(m) {
    var d = new Date(m.date);
    return d >= monday && d <= sunday;
  });
  
  var weekPRs = state.data.personalRecords.filter(function(p) {
    var d = new Date(p.date);
    return d >= monday && d <= sunday;
  });
  
  // 일별 단백질
  var dailyP = {};
  weekMeals.forEach(function(m) {
    if (!dailyP[m.date]) dailyP[m.date] = 0;
    dailyP[m.date] += m.protein || 0;
  });
  var dailyProteins = Object.values(dailyP);
  var avgProtein = dailyProteins.length > 0 
    ? Math.round(dailyProteins.reduce(function(s, p) { return s + p; }, 0) / dailyProteins.length)
    : 0;
  var achievedDays = dailyProteins.filter(function(p) { return p >= state.profile.proteinTarget; }).length;
  
  // 체중 변화
  var weekBodyLogs = (state.data.bodyLog || []).filter(function(b) {
    var d = new Date(b.date);
    return d >= monday && d <= sunday;
  });
  var startWeight = weekBodyLogs.length > 0 ? weekBodyLogs[0].weight : state.profile.weight;
  var endWeight = weekBodyLogs.length > 0 ? weekBodyLogs[weekBodyLogs.length - 1].weight : state.profile.weight;
  var weightChange = (endWeight - startWeight).toFixed(2);
  
  return {
    monday: monday.toISOString().split('T')[0],
    sunday: sunday.toISOString().split('T')[0],
    workouts: weekWorkouts,
    workoutCount: weekWorkouts.length,
    pushCount: weekWorkouts.filter(function(w) { return w.sessionKr === 'PUSH'; }).length,
    pullCount: weekWorkouts.filter(function(w) { return w.sessionKr === 'PULL'; }).length,
    legsCount: weekWorkouts.filter(function(w) { return w.sessionKr === 'LEGS'; }).length,
    freeCount: weekWorkouts.filter(function(w) { return w.sessionKr === 'FREE'; }).length,
    prs: weekPRs,
    avgProtein: avgProtein,
    achievedDays: achievedDays,
    daysTracked: dailyProteins.length,
    weightChange: parseFloat(weightChange),
    startWeight: startWeight,
    endWeight: endWeight
  };
}

// 주간 리뷰 생성
async function generateWeeklyReview(forceRefresh) {
  if (!state.apiKey) return null;
  
  var weekData = collectWeekData();
  var weekId = getWeekId(new Date());
  
  // 캐시 확인
  if (!forceRefresh) {
    var cached = storage.get(KEYS.WEEKLY_REVIEW);
    if (cached && cached.weekId === weekId) {
      return cached;
    }
  }
  
  var profile = state.profile;
  var dayMap = ['일','월','화','수','목','금','토'];
  
  var weekSummary = '## 이번 주 데이터 (' + weekData.monday + ' ~ ' + weekData.sunday + ')\n\n';
  
  weekSummary += '### 운동\n';
  weekSummary += '- 총 ' + weekData.workoutCount + '회 (목표 ' + profile.workoutFreq + '회)\n';
  weekSummary += '- PUSH: ' + weekData.pushCount + '회, PULL: ' + weekData.pullCount + '회, LEGS: ' + weekData.legsCount + '회, FREE: ' + weekData.freeCount + '회\n';
  if (weekData.workouts.length > 0) {
    weekData.workouts.forEach(function(w) {
      var d = new Date(w.date);
      weekSummary += '  · ' + dayMap[d.getDay()] + ': ' + w.sessionKr + ' (' + w.duration + '분, ' + w.sets + '세트)\n';
    });
  }
  weekSummary += '\n### 영양\n';
  weekSummary += '- 단백질 일평균: ' + weekData.avgProtein + 'g (목표 ' + profile.proteinTarget + 'g)\n';
  weekSummary += '- 목표 달성일: ' + weekData.achievedDays + '/' + Math.max(1, weekData.daysTracked) + '일\n';
  weekSummary += '\n### 체중\n';
  weekSummary += '- 시작: ' + weekData.startWeight + 'kg → 종료: ' + weekData.endWeight + 'kg (' + (weekData.weightChange > 0 ? '+' : '') + weekData.weightChange + 'kg)\n';
  if (weekData.prs.length > 0) {
    weekSummary += '\n### PR (' + weekData.prs.length + '개)\n';
    weekData.prs.forEach(function(p) {
      if (p.weight) {
        weekSummary += '- ' + p.exerciseName + ': ' + p.previousWeight + 'kg → ' + p.weight + 'kg × ' + p.reps + '회\n';
      } else {
        weekSummary += '- ' + p.exerciseName + ': ' + (p.previousReps || 0) + ' → ' + p.reps + '회\n';
      }
    });
  }
  
  // 부위별 볼륨 분석 (이번 주만)
  var weeklyVolByPart = {};
  if (weekData.workouts) {
    weekData.workouts.forEach(function(w) {
      if (!w.exercises || !Array.isArray(w.exercises)) return;
      w.exercises.forEach(function(ex) {
        var info = getExercisePart(ex.name);
        if (!info) return;
        var setCount = 0;
        if (typeof ex.setsCount === 'number') setCount = ex.setsCount;
        else if (typeof ex.sets === 'number') setCount = ex.sets;
        else if (Array.isArray(ex.setsDetail)) setCount = ex.setsDetail.filter(function(s) { return s.completed && !s.isWarmup; }).length;
        else if (Array.isArray(ex.sets)) setCount = ex.sets.filter(function(s) { return s.completed && !s.isWarmup; }).length;
        if (setCount === 0) return;
        weeklyVolByPart[info.primary] = (weeklyVolByPart[info.primary] || 0) + setCount;
        if (info.secondary) info.secondary.forEach(function(s) {
          weeklyVolByPart[s] = (weeklyVolByPart[s] || 0) + setCount * 0.3;
        });
      });
    });
  }
  
  // 부위 볼륨 텍스트 추가 (그룹 합산 적용)
  var volKeys = Object.keys(weeklyVolByPart);
  if (volKeys.length > 0) {
    var weekGrouped = groupVolumeBy(weeklyVolByPart);
    weekSummary += '\n### 부위별 볼륨 (이번 주, 세트, 그룹 합산)\n';
    var groupKeys = Object.keys(weekGrouped).sort(function(a, b) { return weekGrouped[b] - weekGrouped[a]; });
    groupKeys.forEach(function(g) {
      var vol = weekGrouped[g];
      var status = vol < 4 ? '🔴 부족' : (vol < 10 ? '🟡 MEV' : (vol <= 20 ? '🟢 적정' : '🔥 과잉'));
      weekSummary += '- ' + BODY_PART_GROUPS[g].kr + ': ' + vol.toFixed(1) + '세트 (' + status + ')\n';
    });
  }
  
  // 이번 주 컨디션 추이
  var weekStart = new Date(weekData.monday + 'T00:00:00');
  var weekConditions = (state.data.conditionLog || []).filter(function(c) {
    return new Date(c.date) >= weekStart;
  });
  if (weekConditions.length > 0) {
    var avgRpe = 0, avgCond = 0, rpeCnt = 0, condCnt = 0;
    weekConditions.forEach(function(c) {
      if (c.rpe) { avgRpe += c.rpe; rpeCnt++; }
      if (c.condition) { avgCond += c.condition; condCnt++; }
    });
    weekSummary += '\n### 컨디션 (' + weekConditions.length + '회 기록)\n';
    if (rpeCnt > 0) weekSummary += '- 강도 체감(RPE) 평균: ' + (avgRpe / rpeCnt).toFixed(1) + '/10\n';
    if (condCnt > 0) weekSummary += '- 전반 컨디션 평균: ' + (avgCond / condCnt).toFixed(1) + '/5\n';
  }
  
  var systemPrompt = '당신은 사용자의 피트니스 코치입니다. 이번 주 운동/영양/체중 데이터를 분석해 주간 리뷰를 작성하세요. ' +
    '반드시 JSON으로만 응답하세요.\n\n' +
    
    '## 🧬 평가 기준 (과학 근거)\n' +
    '- **운동 빈도**: 부위당 주 2회 자극 우월 (Schoenfeld 2016)\n' +
    '- **부위 볼륨**: 주 10~20세트 최적 (Pelland 2024). 4세트 미만 = 부족, 20초과 = 과잉\n' +
    '- **부위 균형**: PUSH/PULL/LEGS 골고루. 한 부위만 과잉 X.\n' +
    '- **단백질**: 목표 달성률 (1.6~2.2g/kg 권장)\n' +
    '- **체중 변화**: 리컴포지션 목표 시 ±0.3kg/주 적정\n' +
    '- **PR 갱신**: 점진적 과부하 성과 지표\n\n' +
    
    '## 등급 기준\n' +
    '- S: 운동 빈도 달성 + 부위 균형 + 단백질 90%+ + PR 갱신 있음\n' +
    '- A: 운동 빈도 달성 + 단백질 80%+\n' +
    '- B: 운동 빈도 70%+ 또는 단백질 70%+\n' +
    '- C: 부분 달성 (40~60%)\n' +
    '- D: 거의 미실행 (40% 미만)\n\n' +
    
    '## 응답 형식\n' +
    '{\n' +
    '  "headline": "이번 주 핵심 한 줄 (예: 운동 빈도 좋았으나 어깨 측면 부족)",\n' +
    '  "grade": "S" | "A" | "B" | "C" | "D",\n' +
    '  "wins": ["잘한 점 1 (구체적 수치 인용)", "잘한 점 2", "잘한 점 3"],\n' +
    '  "improvements": ["개선점 1 (구체적 부위/수치)", "개선점 2"],\n' +
    '  "nextWeek": ["다음 주 조정 1 (예: 어깨 측면 주 +4세트 추가)", "다음 주 조정 2", "다음 주 조정 3"],\n' +
    '  "coachNote": "마지막 격려/지적 한 문단 (사용자 데이터 직접 인용)"\n' +
    '}\n\n' +
    
    '## 사용자 프로필\n' +
    '- ' + profile.age + '세, ' + profile.height + 'cm, 목표: 린매스\n' +
    '- 목표: 주 ' + profile.workoutFreq + '회 운동, 단백질 ' + profile.proteinTarget + 'g/일\n' +
    '- 사이클: ' + profile.currentCycle + '차 / ' + profile.currentWeek + '주차 (' + profile.cyclePhase + ')\n\n' +
    weekSummary;
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [
          { role: 'user', content: '이번 주 데이터를 분석해서 리뷰를 JSON으로 작성하세요.' }
        ]
      })
    });
    
    if (!response.ok) {
      console.error('주간 리뷰 실패:', response.status);
      return null;
    }
    
    var data = await response.json();
    if (!data || !Array.isArray(data.content) || data.content.length === 0 || !data.content[0].text) {
      return null;
    }
    var content = data.content[0].text;
    
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        parsed = JSON.parse(match[0]);
      } else {
        return null;
      }
    }
    
    var result = {
      weekId: weekId,
      monday: weekData.monday,
      sunday: weekData.sunday,
      headline: parsed.headline || '',
      grade: parsed.grade || 'B',
      wins: Array.isArray(parsed.wins) ? parsed.wins : [],
      improvements: Array.isArray(parsed.improvements) ? parsed.improvements : [],
      nextWeek: Array.isArray(parsed.nextWeek) ? parsed.nextWeek : [],
      coachNote: parsed.coachNote || '',
      stats: {
        workoutCount: weekData.workoutCount,
        avgProtein: weekData.avgProtein,
        achievedDays: weekData.achievedDays,
        weightChange: weekData.weightChange,
        prCount: weekData.prs.length
      },
      generatedAt: new Date().toISOString()
    };
    
    storage.set(KEYS.WEEKLY_REVIEW, result);
    return result;
  } catch (error) {
    console.error('주간 리뷰 호출 실패:', error);
    return null;
  }
}

// 정체기 신호 감지 (규칙 기반 pre-check)
function detectPlateauSignals() {
  var today = new Date();
  var twoWeeksAgo = new Date(today);
  twoWeeksAgo.setDate(today.getDate() - 14);
  
  var signals = [];
  
  // 1. PR 갱신 없음 (2주)
  var recentPRs = state.data.personalRecords.filter(function(p) {
    return new Date(p.date) >= twoWeeksAgo;
  });
  if (recentPRs.length === 0 && state.data.workoutLog.length > 5) {
    signals.push('pr_stalled');
  }
  
  // 2. 체중 변화 없음 (2주, 0.3kg 미만)
  var bodyLog = state.data.bodyLog || [];
  if (bodyLog.length >= 5) {
    var recent = bodyLog.slice(-1)[0];
    var twoWeeksAgoLog = bodyLog.find(function(b) {
      return new Date(b.date) >= twoWeeksAgo;
    });
    if (twoWeeksAgoLog && Math.abs(recent.weight - twoWeeksAgoLog.weight) < 0.3) {
      signals.push('weight_stalled');
    }
  }
  
  // 3. 운동 빈도 감소
  var oneWeekAgo = new Date(today);
  oneWeekAgo.setDate(today.getDate() - 7);
  var thisWeekCount = state.data.workoutLog.filter(function(w) {
    return new Date(w.date) >= oneWeekAgo;
  }).length;
  if (thisWeekCount < state.profile.workoutFreq - 1) {
    signals.push('frequency_drop');
  }
  
  // 4. 단백질 평균 부족
  var recentMeals = state.data.nutritionLog.filter(function(m) {
    return new Date(m.date) >= oneWeekAgo;
  });
  var dailyP = {};
  recentMeals.forEach(function(m) {
    if (!dailyP[m.date]) dailyP[m.date] = 0;
    dailyP[m.date] += m.protein || 0;
  });
  var values = Object.values(dailyP);
  if (values.length > 0) {
    var avg = values.reduce(function(s, p) { return s + p; }, 0) / values.length;
    if (avg < state.profile.proteinTarget * 0.85) {
      signals.push('protein_low');
    }
  }
  
  return signals;
}

// 정체기 분석 (AI)
async function analyzePlateauWithAI(signals) {
  if (!state.apiKey || signals.length === 0) return null;
  
  var context = buildUserContext();
  
  var signalDescriptions = {

    'frequency_drop': '이번 주 운동 빈도가 목표보다 적음',
    'protein_low': '최근 7일 단백질 평균이 목표 대비 85% 미만'
  };
  
  var signalText = signals.map(function(s) { return '- ' + signalDescriptions[s]; }).join('\n');
  
  var systemPrompt = '당신은 사용자의 피트니스 코치입니다. 사용자 데이터에서 정체기 신호가 감지됐습니다. ' +
    '원인을 분석하고 구체적인 변형/조정 방안을 제안하세요. JSON으로만 응답.\n\n' +
    '## 감지된 신호\n' + signalText + '\n\n' +

    '{\n' +
    '  "severity": "low" | "medium" | "high",\n' +
    '  "diagnosis": "원인 진단 (2~3문장)",\n' +
    '  "primary_cause": "주요 원인 한 줄",\n' +
    '  "recommendations": ["조정안 1", "조정안 2", "조정안 3"],\n' +
    '  "encouragement": "격려 한 문단"\n' +
    '}\n\n' +
    '## 정체기 분석 원칙\n' +
    '- 점진 과부하 실패: 중량/횟수 정체 → 디로드 또는 변형 자극\n' +
    '- 영양 부족: 단백질/칼로리 → 분배 또는 총량 조정\n' +
    '- 회복 부족: 빈도/수면 → 휴식일 늘리기\n' +
    '- 자극 적응: 같은 종목 6주 이상 → 종목 교체\n\n' +
    '## 사용자 데이터\n' + context;
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1024,
        system: systemPrompt,
        messages: [
          { role: 'user', content: '정체기 신호를 분석해서 JSON으로 답하세요.' }
        ]
      })
    });
    
    if (!response.ok) return null;
    
    var data = await response.json();
    if (!data || !Array.isArray(data.content) || data.content.length === 0 || !data.content[0].text) {
      return null;
    }
    var content = data.content[0].text;
    
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else return null;
    }
    
    var result = {
      detectedAt: getTodayStr(),
      signals: signals,
      severity: parsed.severity || 'medium',
      diagnosis: parsed.diagnosis || '',
      primary_cause: parsed.primary_cause || '',
      recommendations: Array.isArray(parsed.recommendations) ? parsed.recommendations : [],
      encouragement: parsed.encouragement || ''
    };
    
    storage.set(KEYS.PLATEAU_CHECK, result);
    return result;
  } catch (error) {

// 정체기 자동 로드
async function loadPlateauCheckIfNeeded() {
  if (!state.apiKey) return;
  if (state.plateauCheckLoading) return;
  
  // 캐시 (3일 유효)
  var cached = storage.get(KEYS.PLATEAU_CHECK);
  if (cached && cached.detectedAt) {
    var cachedDate = new Date(cached.detectedAt);
    var daysDiff = (new Date() - cachedDate) / 86400000;
    if (daysDiff < 3) {
      state.plateauCheck = cached;
      return;
    }
  }
  
  // 신호 감지
  var signals = detectPlateauSignals();
  if (signals.length < 2) {
    state.plateauCheck = null;
    storage.set(KEYS.PLATEAU_CHECK, null);
    return;
  }
  
  state.plateauCheckLoading = true;
  render();
  
  var analysis = await analyzePlateauWithAI(signals);
  state.plateauCheck = analysis;
  state.plateauCheckLoading = false;
  render();
}

  }
  
  if (!state.apiKey) {
    state.coachMessages.push({ role: 'user', content: text });
    state.coachMessages.push({ 
      role: 'assistant', 
      content: '⚠️ API 키가 설정되지 않았어요.\n\n' +
        '코치 기능을 사용하려면:\n' +
        '1. **더보기** 탭으로 이동\n' +
        '2. **Anthropic API 키** 메뉴\n' +
        '3. 키 입력 후 저장\n\n' +
        '키는 본인 기기에만 저장되며 외부로 전송되지 않습니다.' 
    });
    state.coachInputText = '';
    render();
    scrollCoachToBottom();
    return;
  }
  
  // 사용자 메시지 추가
  state.coachMessages.push({ role: 'user', content: text });
  state.coachInputText = '';
  state.coachThinking = true;
  render();
  scrollCoachToBottom();
  
  // API에 보낼 메시지 (마지막 20개만)
  var apiMessages = state.coachMessages.slice(-20).map(function(m) {
    return { role: m.role, content: m.content };
  });
  
  // API 호출
  var result = await callCoachAPI(apiMessages);
  
  state.coachThinking = false;
  
  if (result.error) {
    state.coachMessages.push({ 
      role: 'assistant', 
      content: '⚠️ ' + result.error 
    });
  } else {
    state.coachMessages.push({ 
      role: 'assistant', 
      content: result.text 
    });
  }
  
  // 저장
  var toSave = state.coachMessages.slice(-30);
  storage.set(KEYS.COACH_HISTORY, toSave);
  
  render();
  scrollCoachToBottom();
};

function scrollCoachToBottom() {
  setTimeout(function() {
    var area = document.getElementById('coach-chat-area');
    if (area) area.scrollTop = area.scrollHeight;
    window.scrollTo(0, document.body.scrollHeight);
  }, 50);
}

// 간단한 마크다운 → HTML (안전한 기본 변환)
function renderMarkdown(text) {
  if (!text) return '';
  
  // HTML 이스케이프 먼저
  var escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  
  // 마크다운 변환
  return escaped
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br/>');
}

  render();
};

window.addBodyRecord = function() {
  var lastWeight = state.data.bodyLog.length > 0 
    ? state.data.bodyLog[state.data.bodyLog.length - 1].weight 
    : state.profile.weight;
  
  var input = prompt('현재 체중 (kg)을 입력하세요:', lastWeight);
  if (input === null) return;
  
  var weight = parseFloat(input);
  if (isNaN(weight) || weight < 30 || weight > 200) {
    alert('30~200kg 사이로 입력해주세요');
    return;
  }
  
  var tdStr = getTodayStr();
  var existingIdx = state.data.bodyLog.findIndex(function(b) { return b.date === tdStr; });
  
  if (existingIdx !== -1) {
    state.data.bodyLog[existingIdx].weight = weight;
  } else {
    state.data.bodyLog.push({
      date: tdStr,
      weight: weight,
      bodyFat: null
    });
  }
  
  storage.set(KEYS.BODY_LOG, state.data.bodyLog);
  
  // 프로필 체중도 업데이트
  state.profile.weight = weight;
  storage.set(KEYS.PROFILE, state.profile);
  
  render();
};

function getPeriodDays(period) {
  switch (period) {
    case '1week': return 7;
    case '1month': return 30;
    case '3month': return 90;
    case 'all': return 9999;
    default: return 30;
  }
}

function getPeriodLabel(period) {
  switch (period) {
    case '1week': return '1주';
    case '1month': return '1개월';
    case '3month': return '3개월';
    case 'all': return '전체';
    default: return '1개월';
  }
}

// 기간 내 데이터 필터
function filterByPeriod(items, period, dateField) {
  if (period === 'all') return items;
  
  var days = getPeriodDays(period);
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  cutoff.setHours(0, 0, 0, 0);
  
  return items.filter(function(item) {
    var d = new Date(item[dateField || 'date']);
    return d >= cutoff;
  });
}

// SVG path 생성 (선 그래프)
function generateLinePath(data, width, height, padding) {
  if (data.length === 0) return { path: '', area: '', points: '' };
  
  var values = data.map(function(d) { return d.value; });
  var minVal = Math.min.apply(null, values);
  var maxVal = Math.max.apply(null, values);
  var range = maxVal - minVal || 1;
  
  // Y 범위에 약간 여유
  var yMin = minVal - range * 0.1;
  var yMax = maxVal + range * 0.1;
  var yRange = yMax - yMin || 1;
  
  var pathData = '';
  var areaData = '';
  var pointsData = '';
  
  data.forEach(function(d, i) {
    var x = data.length === 1 ? width / 2 : (i / (data.length - 1)) * width;
    var y = height - ((d.value - yMin) / yRange) * height;
    
    if (i === 0) {
      pathData = 'M ' + x + ',' + y;
      areaData = 'M ' + x + ',' + height + ' L ' + x + ',' + y;
    } else {
      pathData += ' L ' + x + ',' + y;
      areaData += ' L ' + x + ',' + y;
    }
    
    var isLast = i === data.length - 1;
    pointsData += '<circle cx="' + x + '" cy="' + y + '" r="' + (isLast ? 4 : 3) + '" fill="#00d4ff"' + (isLast ? ' stroke="white" stroke-width="2"' : '') + '/>';
  });
  
  areaData += ' L ' + width + ',' + height + ' Z';
  
  return {
    path: pathData,
    area: areaData,
    points: pointsData,
    yMin: yMin,
    yMax: yMax
  };
}

            '<p class="text-xs font-mono accent">' + state.data.bodyLog.length + '개</p>' +
          '</div>' +
          '<p class="text-[10px] font-mono text-stone-500 mb-3">클릭하여 상세 보기 / 삭제</p>' +
          '<div>' +
            state.data.bodyLog.slice(-10).reverse().map(function(b) {
              return '<div class="workout-history-row" onclick="openItemDetail(\'body\', \'' + b.date + '\')">' +
                '<div class="flex items-center gap-3">' +
                  '<div class="workout-history-dot" style="background: #a78bfa; box-shadow: 0 0 6px rgba(167, 139, 250, 0.5);"></div>' +
                  '<div>' +
                    '<p class="text-xs font-display font-bold">' + b.weight + 'kg</p>' +
                    '<p class="text-[10px] font-mono text-stone-500 mt-0\\.5">' + b.date + '</p>' +
                  '</div>' +
                '</div>' +
                '<div style="color: #6b7a99;">' + icon('chevron', 14) + '</div>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' : '') +
      
      // 사이클 진행
      '<div class="card">' +
        '<p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-3">현재 사이클</p>' +
        '<div class="flex items-baseline justify-between mb-3">' +
          '<p class="font-bebas text-3xl">Cycle ' + profile.currentCycle + '</p>' +
          '<p class="text-xs font-mono accent">' + profile.currentWeek + ' / 7 주</p>' +
        '</div>' +
        '<div class="progress-bg mb-2"><div class="progress-fill" style="width: ' + Math.round((profile.currentWeek / 7) * 100) + '%;"></div></div>' +
        '<p class="text-[10px] font-mono text-stone-500">' + profile.cyclePhase + ' · ' + (7 - profile.currentWeek) + '주 후 디로드</p>' +
      '</div>' +
      
    '</div>';
}

// ═══════════════════════════════════════════════
// 자리표시 화면
// ═══════════════════════════════════════════════
function renderPlaceholder(title, label, iconName) {
  return '' +
    '<div class="px-5 pt-12 pb-32">' +
      '<p class="text-xs uppercase font-mono text-stone-500 mb-2" style="letter-spacing: 0.3em;">' + label + '</p>' +
      '<h1 class="font-bebas text-4xl">' + title + '</h1>' +
      '<div class="mt-20 text-center">' +
        '<div class="placeholder-icon">' + icon(iconName, 36) + '</div>' +
        '<p class="text-sm text-stone-500 font-mono">준비 중</p>' +
        '<p class="text-xs text-stone-600 mt-2 leading-relaxed">다음 단계에서 구현됩니다</p>' +
      '</div>' +
    '</div>';
}

// ═══════════════════════════════════════════════
// 탭바
// ═══════════════════════════════════════════════
function renderTabbar() {
  var tabs = [
    { id: 'home', label: 'HOME', iconName: 'home' },
    { id: 'workout', label: 'WORKOUT', iconName: 'dumbbell' },
    { id: 'fuel', label: 'FUEL', iconName: 'apple' },
    { id: 'stats', label: 'STATS', iconName: 'chart' },
    { id: 'more', label: 'MORE', iconName: 'more' }
  ];
  
  var html = '<div class="tabbar">';
  tabs.forEach(function(t) {
    html += '<div class="tab ' + (state.currentTab === t.id ? 'active' : '') + '" onclick="setTab(\'' + t.id + '\')">' +
      icon(t.iconName, 22) +
      '<span>' + t.label + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

// ═══════════════════════════════════════════════
// 메인 렌더
// ═══════════════════════════════════════════════
function render() {
  // 1RM 리스트 (최우선)
  if (state.oneRMListOpen) {
    document.getElementById('app').innerHTML = renderOneRMList();
    return;
  }
  
  // 주간 리뷰 상세
  if (state.weeklyReviewOpen) {
    document.getElementById('app').innerHTML = renderWeeklyReviewDetail();
    return;
  }
  
  // 정체기 상세
  if (state.plateauOpen) {
    document.getElementById('app').innerHTML = renderPlateauDetail();
    return;
  }
  
  // 코치 채팅
  if (state.coachChatOpen) {
    document.getElementById('app').innerHTML = renderCoachChat();
    return;
  }
  
  // 음식 입력 화면
  if (state.foodInputOpen) {
    document.getElementById('app').innerHTML = renderFoodInput();
    return;
  }
  
  // 완료 화면
  if (state.completedSession) {
    document.getElementById('app').innerHTML = renderWorkoutComplete();
    window.scrollTo(0, 0);
    return;
  }
  
  // 활성 세션이 있으면 세션 화면
  if (state.activeSession) {
    document.getElementById('app').innerHTML = renderWorkoutSession();
    return;
  }
  
  var content = '';
  switch (state.currentTab) {
    case 'home': content = renderHome(); break;
    case 'workout': content = renderWorkout(); break;
    case 'fuel': content = renderFuel(); break;
    case 'stats': content = renderStats(); break;
    case 'more': content = renderMore(); break;
  }
  
  // 항목 상세 시트 오버레이 (있을 시)
  var detailSheet = state.itemDetailSheet ? renderItemDetailSheet() : '';
  
  // 전체 초기화 확인 오버레이
  var resetOverlay = state.resetConfirming ? renderResetConfirm() : '';
  
  document.getElementById('app').innerHTML = content + renderTabbar() + detailSheet + resetOverlay;
  window.scrollTo(0, 0);
}

// 전체 초기화 확인 모달
function renderResetConfirm() {
  return '' +
    '<div class="sheet-overlay" onclick="cancelResetAll()">' +
      '<div class="sheet" onclick="event.stopPropagation()">' +
        '<div class="sheet-handle"></div>' +
        '<div class="text-center mb-4">' +
          '<div style="font-size: 48px; margin-bottom: 8px;">⚠️</div>' +
          '<p class="font-display font-bold text-xl mb-2" style="color: #ef4444;">전체 데이터 삭제</p>' +
          '<p class="text-xs text-stone-400 leading-relaxed">' +
            '운동 기록, 영양 기록, 체중 기록, PR, 1RM,<br/>' +
            '코치 채팅 등 <strong style="color: #fbbf24;">모든 데이터</strong>가 영구 삭제됩니다.<br/>' +
            '이 작업은 되돌릴 수 없습니다.' +
          '</p>' +
        '</div>' +
        
        '<div style="display: grid; grid-template-columns: 1fr 1.4fr; gap: 8px;">' +
          '<button class="sheet-cancel-btn" onclick="cancelResetAll()">취소</button>' +
          '<button class="sheet-delete-btn-confirm" onclick="executeResetAll()">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>' +
            '</svg>' +
            '<span>모두 삭제</span>' +
          '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ═══════════════════════════════════════════════
// 탭 전환
// ═══════════════════════════════════════════════
window.setTab = function(tabId) {
  // 모든 탭 진입 시 데이터 강제 재로드 (삭제 즉시 반영 보장)
  state.data.workoutLog = storage.get(KEYS.WORKOUT_LOG) || [];
  state.data.nutritionLog = storage.get(KEYS.NUTRITION_LOG) || [];
  state.data.bodyLog = storage.get(KEYS.BODY_LOG) || [];
  state.data.personalRecords = storage.get(KEYS.PERSONAL_RECORDS) || [];
  console.log('[setTab] ' + tabId + ' - 운동:' + state.data.workoutLog.length + ' 영양:' + state.data.nutritionLog.length);

  // 운동 탭 진입 시 마법사는 이전 진행 단계를 그대로 유지 (저장된 state 복원됨)
  state.currentTab = tabId;
  render();
};

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════
function init() {
  var initialized = storage.get(KEYS.INITIALIZED);
  
  if (!initialized) {
    storage.set(KEYS.PROFILE, DEFAULT_PROFILE);
    var demo = generateDemoData();
    storage.set(KEYS.WORKOUT_LOG, demo.workoutLog);
    storage.set(KEYS.NUTRITION_LOG, demo.nutritionLog);
    storage.set(KEYS.PERSONAL_RECORDS, demo.personalRecords);
    storage.set(KEYS.BODY_LOG, demo.bodyLog);
    storage.set(KEYS.INITIALIZED, true);
  }
  
  state.profile = storage.get(KEYS.PROFILE, DEFAULT_PROFILE);
  state.data = {
    workoutLog: storage.get(KEYS.WORKOUT_LOG, []),
    nutritionLog: storage.get(KEYS.NUTRITION_LOG, []),
    personalRecords: storage.get(KEYS.PERSONAL_RECORDS, []),
    bodyLog: storage.get(KEYS.BODY_LOG, []),
    conditionLog: storage.get(KEYS.CONDITION_LOG, [])
  };
  
  // API 키 + 설정 로드
  state.apiKey = storage.get(KEYS.API_KEY, null);
  state.settings = storage.get(KEYS.SETTINGS, { notifications: true, theme: 'dark', unit: 'kg' });
  
  // 1RM 초기 데이터 로드 (첫 실행 시 INITIAL_1RM 자동 입력)
  initializeOneRMData();
  
  // 캐시된 AI 추천 로드 (오늘 것만)
  var cachedRec = storage.get(KEYS.AI_RECOMMENDATION);
  if (cachedRec && cachedRec.date === getTodayStr()) {
    state.aiRecommendation = cachedRec;
  }
  
  // 캐시된 주간 리뷰 로드 (이번 주 것만)
  var cachedReview = storage.get(KEYS.WEEKLY_REVIEW);
  if (cachedReview && cachedReview.weekId === getWeekId(new Date())) {
    state.weeklyReview = cachedReview;
  }
  
  // 캐시된 정체기 체크 로드 (3일 이내)
  var cachedPlateau = storage.get(KEYS.PLATEAU_CHECK);
  if (cachedPlateau && cachedPlateau.detectedAt) {
    var daysDiff = (new Date() - new Date(cachedPlateau.detectedAt)) / 86400000;
    if (daysDiff < 3) {
      state.plateauCheck = cachedPlateau;
    }
  }

  // 진행 중이던 운동 세션 복원 (백그라운드/새로고침에서 돌아왔을 때)
  var savedSession = storage.get(KEYS.ACTIVE_SESSION);
  if (savedSession && savedSession.exercises && savedSession.startTime) {
    state.activeSession = savedSession;
  }

  // 진행 중이던 운동 마법사 상태 복원 (운동 짜는 단계가 백그라운드 후에도 유지되도록)
  var savedWizard = storage.get(KEYS.WORKOUT_WIZARD);
  if (savedWizard) {
    if (savedWizard.workoutWizardStep) state.workoutWizardStep = savedWizard.workoutWizardStep;
    if (savedWizard.selectedBodyPart) state.selectedBodyPart = savedWizard.selectedBodyPart;
    if (savedWizard.generatedRoutine) state.generatedRoutine = savedWizard.generatedRoutine;
    if (Array.isArray(savedWizard.routineChatHistory)) state.routineChatHistory = savedWizard.routineChatHistory;
    if (typeof savedWizard.routineChatInput === 'string') state.routineChatInput = savedWizard.routineChatInput;
    if (typeof savedWizard.routinePreviewExpanded === 'boolean') state.routinePreviewExpanded = savedWizard.routinePreviewExpanded;
  }
  var savedRest = storage.get(KEYS.REST_TIMER);
  if (savedRest && savedRest.startTime && savedRest.duration) {
    var elapsedSec = Math.floor((Date.now() - savedRest.startTime) / 1000);
    if (elapsedSec < savedRest.duration) {
      state.restTimer = savedRest;
      startRestTimerTick();
    } else {
      // 자리비운 사이 휴식 시간 종료된 경우 정리
      storage.set(KEYS.REST_TIMER, null);
    }
  }

  render();
}

init();

// ═══════════════════════════════════════════════
// 운동 화면 좌우 스와이프 → 다음/이전 종목
// ═══════════════════════════════════════════════
(function() {
  var startX = 0;
  var startY = 0;
  var startTime = 0;
  var tracking = false;

  document.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) { tracking = false; return; }
    // 스크롤 가능한 입력 영역(input, textarea)에서 시작한 터치는 무시
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) {
      tracking = false;
      return;
    }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
    tracking = true;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!tracking) return;
    tracking = false;

    // 운동 진행 중 + 다른 오버레이 없을 때만 동작
    if (!state.activeSession) return;
    if (state.editingSet) return;
    if (state.completedSession) return;
    if (state.foodInputOpen) return;
    if (state.itemDetailSheet) return;
    if (state.resetConfirming) return;

    var touch = e.changedTouches[0];
    if (!touch) return;

    var dx = touch.clientX - startX;
    var dy = touch.clientY - startY;
    var dt = Date.now() - startTime;

    // 임계값: 수평 60px 이상, 수평이 수직보다 1.5배 이상 우세, 800ms 이내
    if (Math.abs(dx) < 60) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.5) return;
    if (dt > 800) return;

    var session = state.activeSession;
    var idx = session.currentExerciseIdx;
    var total = session.exercises.length;

    if (dx < 0 && idx < total - 1) {
      // 좌로 스와이프 → 다음 종목
      window.goToExercise(idx + 1);
    } else if (dx > 0 && idx > 0) {
      // 우로 스와이프 → 이전 종목
      window.goToExercise(idx - 1);
    }
  }, { passive: true });
})();

// ═══════════════════════════════════════════════
// PWA - Service Worker 등록
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/service-worker.js')
      .then(function(reg) {
        console.log('[PWA] Service Worker 등록 성공:', reg.scope);
      })
      .catch(function(err) {
        console.warn('[PWA] Service Worker 등록 실패:', err);
      });
  });
}

// PWA 설치 프롬프트 (Android Chrome)
var deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstallPrompt = e;
  console.log('[PWA] 설치 가능');
});

// 외부에서 호출 가능한 설치 함수
window.installPWA = function() {
  if (!deferredInstallPrompt) {
    alert('이미 설치되었거나, 브라우저 메뉴에서 "홈 화면에 추가"를 선택하세요.');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(function(choice) {
    if (choice.outcome === 'accepted') {
      showToast('✓ 설치 시작!');
    }
    deferredInstallPrompt = null;
  });
};

window.addEventListener('appinstalled', function() {
  console.log('[PWA] 앱 설치 완료');
  showToast('✓ 헬스앱 설치 완료');
});
</script>
