<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="헬스앱">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00d4ff">
<meta name="description" content="AI 기반 피트니스 코치 - 운동·영양·기록 통합 관리">

<!-- PWA 매니페스트 -->
<link rel="manifest" href="/manifest.json">

<!-- 아이콘 -->
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

<title>헬스앱</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  background: #050810;
  color: white;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
  font-size: 14px;
  line-height: 1.4;
}
button {
  background: transparent;
  border: none;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
}
::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

/* ═══════════════════════════════════════════════
   TYPOGRAPHY HELPERS
   ═══════════════════════════════════════════════ */
.font-display { font-family: 'Space Grotesk', sans-serif; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

/* ═══════════════════════════════════════════════
   LAYOUT HELPERS
   ═══════════════════════════════════════════════ */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.items-baseline { align-items: baseline; }
.items-end { align-items: flex-end; }
.items-start { align-items: flex-start; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.relative { position: relative; }
.overflow-hidden { overflow: hidden; }
.flex-shrink-0 { flex-shrink: 0; }

.gap-1 { gap: 4px; }
.gap-1\.5 { gap: 6px; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }

.grid { display: grid; }
.grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid-cols-4 { grid-template-columns: repeat(4, 1fr); }
.grid-cols-7 { grid-template-columns: repeat(7, 1fr); }

/* ═══════════════════════════════════════════════
   SPACING
   ═══════════════════════════════════════════════ */
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-5 { margin-bottom: 20px; }
.mt-0\.5 { margin-top: 2px; }
.mt-1 { margin-top: 4px; }
.mt-1\.5 { margin-top: 6px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mt-20 { margin-top: 80px; }
.pt-4 { padding-top: 16px; }
.pt-12 { padding-top: 48px; }
.pb-5 { padding-bottom: 20px; }
.pb-32 { padding-bottom: 128px; }
.px-1 { padding-left: 4px; padding-right: 4px; }
.px-5 { padding-left: 20px; padding-right: 20px; }
.py-1\.5 { padding-top: 6px; padding-bottom: 6px; }

/* ═══════════════════════════════════════════════
   COMPONENT: SIZES
   ═══════════════════════════════════════════════ */
.w-2 { width: 8px; }
.w-9 { width: 36px; }
.w-10 { width: 40px; }
.w-20 { width: 80px; }
.w-full { width: 100%; }
.h-2 { height: 8px; }
.h-9 { height: 36px; }
.h-10 { height: 40px; }
.h-20 { height: 80px; }
.h-px { height: 1px; }
.aspect-square { aspect-ratio: 1 / 1; }
.min-h-screen { min-height: 100vh; }
.max-w-\[240px\] { max-width: 240px; }

/* ═══════════════════════════════════════════════
   COMPONENT: COLORS & BACKGROUNDS
   ═══════════════════════════════════════════════ */
.accent { color: #00d4ff; }
.accent-bg { background: #00d4ff; }
.text-stone-200 { color: #e7e5e4; }
.text-stone-300 { color: #d6d3d1; }
.text-stone-400 { color: #a8a29e; }
.text-stone-500 { color: #6b7a99; }
.text-stone-600 { color: #4a5568; }
.bg-stone-800 { background: #1a2540; }

/* ═══════════════════════════════════════════════
   COMPONENT: TEXT SIZES
   ═══════════════════════════════════════════════ */
.text-\[9px\] { font-size: 9px; }
.text-\[10px\] { font-size: 10px; }
.text-\[11px\] { font-size: 11px; }
.text-xs { font-size: 11px; }
.text-sm { font-size: 13px; }
.text-base { font-size: 15px; }
.text-xl { font-size: 18px; }
.text-2xl { font-size: 22px; }
.text-4xl { font-size: 36px; }

/* ═══════════════════════════════════════════════
   COMPONENT: BORDERS & RADIUS
   ═══════════════════════════════════════════════ */
.rounded-full { border-radius: 9999px; }
.rounded-lg { border-radius: 12px; }
.rounded-xl { border-radius: 14px; }
.rounded-2xl { border-radius: 18px; }
.rounded-3xl { border-radius: 24px; }
.border-t { border-top: 1px solid #1a2540; }

/* ═══════════════════════════════════════════════
   STYLE HELPERS
   ═══════════════════════════════════════════════ */
.uppercase { text-transform: uppercase; }
.tracking-widest { letter-spacing: 0.1em; }
.font-bold { font-weight: 700; }
.leading-relaxed { line-height: 1.625; }

/* ═══════════════════════════════════════════════
   COMPONENT: CARDS
   ═══════════════════════════════════════════════ */
.card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 24px;
  padding: 20px;
}
.card-accent {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 24px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.card-accent::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 60%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.card-coach {
  background: linear-gradient(135deg, rgba(0,212,255,0.08) 0%, rgba(0,212,255,0.02) 100%);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 24px;
  padding: 18px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: PROGRESS BAR
   ═══════════════════════════════════════════════ */
.progress-bg {
  background: #1a2540;
  border-radius: 9999px;
  overflow: hidden;
  height: 6px;
}
.progress-fill {
  height: 100%;
  border-radius: 9999px;
  background: #00d4ff;
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
  transition: width 0.5s ease;
}

/* ═══════════════════════════════════════════════
   COMPONENT: DOTS
   ═══════════════════════════════════════════════ */
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-passed {
  background: #00d4ff;
  box-shadow: 0 0 8px #00d4ff;
}
.dot-pending {
  background: #1a2540;
}
.dot-ideal {
  background: #00d4ff;
  box-shadow: 0 0 12px #00d4ff, inset 0 0 0 2px white;
}

/* ═══════════════════════════════════════════════
   COMPONENT: COACH ICON
   ═══════════════════════════════════════════════ */
.coach-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   COMPONENT: WEEK DAY BOX
   ═══════════════════════════════════════════════ */
.day-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.day-box-empty {
  background: #050810;
  border: 1px solid #1a2540;
}
.day-box-done {
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
}
.day-box-today {
  background: #050810;
  border: 1px solid #00d4ff;
}
.today-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 8px #00d4ff;
}

/* ═══════════════════════════════════════════════
   COMPONENT: PR BADGE
   ═══════════════════════════════════════════════ */
.pr-badge {
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ═══════════════════════════════════════════════
   COMPONENT: QUICK BUTTON
   ═══════════════════════════════════════════════ */
.quick-btn {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 14px 8px;
  transition: all 0.15s;
  cursor: pointer;
  width: 100%;
}
.quick-btn:active {
  background: #1a2540;
  transform: scale(0.97);
}
.quick-btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(0, 212, 255, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  margin: 0 auto 8px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: TABBAR
   ═══════════════════════════════════════════════ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(5, 8, 16, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid #1a2540;
  padding: 10px 0 24px 0;
  z-index: 100;
  display: flex;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0;
  cursor: pointer;
  transition: color 0.2s;
  color: #4a5568;
}
.tab.active {
  color: #00d4ff;
}
.tab svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
}
.tab span {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   PLACEHOLDER ICON
   ═══════════════════════════════════════════════ */
.placeholder-icon {
  width: 80px;
  height: 80px;
  border-radius: 18px;
  background: #0f1525;
  border: 1px solid #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  color: #4a5568;
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.animate-pulse { animation: pulse 2s ease-in-out infinite; }

/* ═══════════════════════════════════════════════
   COMPONENT: SESSION CARD (운동 메인)
   ═══════════════════════════════════════════════ */
.session-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 28px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.session-card::before {
  content: '';
  position: absolute;
  top: -20%;
  right: -10%;
  width: 50%;
  height: 140%;
  background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.session-badge {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 8px;
  border-radius: 6px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.25);
}
.start-btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  background: #00d4ff;
  color: #050810;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
}
.start-btn:active {
  transform: scale(0.98);
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
}

/* ═══════════════════════════════════════════════
   COMPONENT: EXERCISE ITEM
   ═══════════════════════════════════════════════ */
.ex-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}
.ex-num {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  font-weight: 700;
}

/* ═══════════════════════════════════════════════
   COMPONENT: OPTION CARD (다른 옵션)
   ═══════════════════════════════════════════════ */
.option-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  width: 100%;
}
.option-card:active {
  background: #1a2540;
  transform: scale(0.97);
}

/* ═══════════════════════════════════════════════
   COMPONENT: HISTORY ITEM
   ═══════════════════════════════════════════════ */
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #1a2540;
}
.history-row:last-child { border-bottom: none; }
.history-bar {
  width: 4px;
  height: 32px;
  border-radius: 2px;
  background: #00d4ff;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════
   STATS GRID
   ═══════════════════════════════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.stat-item p:first-child {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.stat-item .stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════
   COMPONENT: HEADER WITH LABEL
   ═══════════════════════════════════════════════ */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-header p:first-child {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* SVG fill 보정 (start-btn 안의 아이콘) */
.start-btn svg { stroke: #050810; fill: #050810; }

/* ═══════════════════════════════════════════════
   추가 폰트/색 헬퍼
   ═══════════════════════════════════════════════ */
.text-5xl { font-size: 44px; }
.mb-8 { margin-bottom: 32px; }
.gap-5 { gap: 20px; }

/* ═══════════════════════════════════════════════
   COMPONENT: 운동 세션 화면
   ═══════════════════════════════════════════════ */
.session-header-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #0f1525;
  border: 1px solid #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: white;
}
.session-progress {
  background: #1a2540;
  border-radius: 9999px;
  overflow: hidden;
  height: 4px;
}
.session-progress-fill {
  height: 100%;
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
  transition: width 0.3s ease;
}

/* 세트 행 */
.set-row {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.set-row:active { transform: scale(0.99); }
.set-row.completed {
  background: rgba(0, 212, 255, 0.06);
  border-color: rgba(0, 212, 255, 0.25);
}
.set-row.active {
  border-color: #00d4ff;
  background: #0a1530;
}
.set-row.warmup {
  background: rgba(42, 53, 80, 0.4);
  border-color: #2a3550;
}

.set-label {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  background: #1a2540;
  color: #6b7a99;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.set-label.warmup-label { background: #2a3550; color: #8a99b8; }
.set-label.done {
  background: #00d4ff;
  color: #050810;
}
.set-label.active-label {
  background: rgba(0, 212, 255, 0.12);
  color: #00d4ff;
  border: 1px solid #00d4ff;
}

.set-info-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.set-info-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
}
.set-info-value {
  font-size: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  color: #d6d3d1;
}
.set-info-value.done { color: white; }
.set-info-value.active { color: #00d4ff; }
.set-info-value.pending { color: #4a5568; }

.set-status-pill {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  background: rgba(0, 212, 255, 0.15);
  padding: 4px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* 휴식 타이머 (하단 고정) */
.rest-timer-wrap {
  position: fixed;
  bottom: 72px;
  left: 0;
  right: 0;
  padding: 16px 20px 12px;
  background: linear-gradient(to top, #050810 80%, transparent);
  z-index: 99;
}
.rest-timer {
  background: #0a1530;
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 18px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rest-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
}
.rest-skip-btn {
  padding: 8px 12px;
  border-radius: 10px;
  background: #1a2540;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
}
.rest-done-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: #00d4ff;
  color: #050810;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

/* 세트 편집 시트 (하단에서 올라옴) */
.sheet-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.sheet {
  width: 100%;
  background: #0f1525;
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  padding: 16px 20px 32px;
  border-top: 1px solid #1a2540;
  animation: slideUp 0.25s ease-out;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.sheet-handle {
  width: 40px;
  height: 4px;
  background: #2a3550;
  border-radius: 9999px;
  margin: 0 auto 16px;
}

/* 큰 숫자 입력 */
.number-display {
  background: #050810;
  border: 1px solid #1a2540;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 8px;
}
.number-display p {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 0.05em;
}
.number-display .number-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: inherit;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 0.05em;
  text-align: center;
  padding: 0;
  -moz-appearance: textfield;
}
.number-display .number-input::-webkit-outer-spin-button,
.number-display .number-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* 조정 버튼 */
.adj-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.adj-btn {
  background: #1a2540;
  border-radius: 12px;
  padding: 12px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: white;
  border: none;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.1s;
}
.adj-btn:active {
  background: #2a3550;
  transform: scale(0.96);
}
.adj-btn.accent-btn {
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff;
  border: 1px solid rgba(0, 212, 255, 0.4);
}

/* 워밍업 토글 */
.warmup-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: #050810;
  border-radius: 12px;
  margin-bottom: 20px;
}
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  background: #1a2540;
  border-radius: 9999px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch.on { background: #00d4ff; }
.toggle-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch.on .toggle-knob {
  transform: translateX(20px);
  background: #050810;
}

/* 시트 완료 버튼 */
.sheet-submit {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  background: #00d4ff;
  color: #050810;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
}
.sheet-submit:active { transform: scale(0.98); }

/* 삭제 버튼 */
.sheet-delete-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: rgba(239, 68, 68, 0.1);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.sheet-delete-btn:active { transform: scale(0.98); }
.sheet-delete-btn:hover {
  background: rgba(239, 68, 68, 0.18);
  border-color: rgba(239, 68, 68, 0.5);
}

/* 삭제 확인 (2단계) */
.sheet-cancel-btn {
  padding: 14px;
  border-radius: 14px;
  background: #0f1525;
  color: #b0b8d0;
  border: 1px solid #1a2540;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}
.sheet-cancel-btn:active { transform: scale(0.98); }

.sheet-delete-btn-confirm {
  padding: 14px;
  border-radius: 14px;
  background: #ef4444;
  color: white;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4);
}
.sheet-delete-btn-confirm:active { transform: scale(0.98); }

/* 상세 시트 전용 통계 카드 (4칼럼 - 작게) */
.stat-sheet-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 10px;
  padding: 8px 4px;
  text-align: center;
  min-width: 0;
  overflow: hidden;
}
.stat-sheet-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stat-sheet-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  color: white;
  letter-spacing: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.1;
}
.stat-sheet-value.accent { color: #00d4ff; }
.stat-sheet-unit {
  font-size: 8px;
  color: #6b7a99;
  font-family: 'JetBrains Mono', monospace;
  margin-left: 1px;
}

/* 음식 항목 행 (클릭 가능) */
.food-item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin: 2px -4px;
}
.food-item-row:active {
  background: rgba(0, 212, 255, 0.05);
}
.food-item-row:hover {
  background: rgba(255, 255, 255, 0.02);
}

/* 운동 기록 행 (클릭 가능) */
.workout-history-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 4px;
  background: rgba(255, 255, 255, 0.02);
}
.workout-history-row:active {
  background: rgba(0, 212, 255, 0.08);
  transform: scale(0.99);
}
.workout-history-row:hover {
  background: rgba(0, 212, 255, 0.05);
}
.workout-history-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 6px rgba(0, 212, 255, 0.5);
}

.input-group { margin-bottom: 16px; }
.input-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 4px;
}
.input-label p {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #6b7a99;
}

/* 종목 정보 카드 */
.exercise-info-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 12px;
}
.exercise-gif-wrap {
  width: 100%;
  aspect-ratio: 16 / 11;
  background: #f4f4f5;
  border-radius: 14px;
  overflow: hidden;
  margin-top: 12px;
  position: relative;
}
.exercise-gif-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.exercise-gif-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1a2540;
  color: #6b7a99;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}

/* 1RM 카드 */
.rm-card {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.06) 0%, rgba(251, 191, 36, 0.01) 100%);
  border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 12px;
}

/* 이전 기록 */
.prev-record {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 완료 화면
   ═══════════════════════════════════════════════ */
.complete-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  color: #00d4ff;
}

/* 컨디션 입력 */
.condition-grid {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.condition-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.condition-label {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #a8a29e;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.condition-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.condition-buttons.rpe-10 {
  /* RPE 10개: 5칸 × 2줄 */
  grid-template-columns: repeat(5, 1fr);
}
.cond-btn {
  background: #0f1525;
  border: 1px solid #1a2540;
  color: #a8a29e;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  padding: 14px 0;
  min-height: 44px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.cond-btn-wide {
  padding: 14px 0;
  font-size: 16px;
}
.cond-btn:active {
  transform: scale(0.95);
}
.cond-btn.selected {
  background: #00d4ff;
  color: #050810;
  border-color: #00d4ff;
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
}
.condition-hint {
  font-size: 10px;
  color: #6b6661;
  font-family: 'JetBrains Mono', monospace;
}

.stat-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 16px 10px;
  text-align: center;
}
.stat-card-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.stat-card-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 0.05em;
  color: #00d4ff;
}
.stat-card-unit {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
}

.pr-alert-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  flex-shrink: 0;
}

.exercise-summary-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #1a2540;
}
.exercise-summary-row:last-child { border-bottom: none; }
.pr-tag {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  background: rgba(0, 212, 255, 0.15);
  padding: 3px 8px;
  border-radius: 6px;
}

.complete-action-btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.complete-action-btn:active { transform: scale(0.98); }
.complete-primary {
  background: #00d4ff;
  color: #050810;
}
.complete-secondary {
  background: #0f1525;
  border: 1px solid #1a2540;
  color: white;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 영양 화면
   ═══════════════════════════════════════════════ */

/* 도넛 차트 */
.donut-chart {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
}
.donut-chart::after {
  content: '';
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #0f1525;
}
.donut-content {
  position: relative;
  z-index: 1;
  text-align: center;
}
.donut-content .donut-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: #00d4ff;
  letter-spacing: 0.05em;
}
.donut-content .donut-sub {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
}

/* 매크로 미니 바 */
.macro-bg { background: #1a2540; height: 3px; border-radius: 9999px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }

/* 끼니 카드 */
.meal-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.meal-card:active { transform: scale(0.99); }
.meal-card.passed {
  border-color: rgba(0, 212, 255, 0.25);
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
}
.meal-card.empty {
  border-style: dashed;
  border-color: #2a3550;
}

.meal-status-pill {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.meal-status-pill.passed {
  color: #00d4ff;
  background: rgba(0, 212, 255, 0.15);
}
.meal-status-pill.warning {
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.15);
}

/* FAB - 플로팅 입력 버튼 */
.fab {
  position: fixed;
  bottom: 96px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #00d4ff;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
  cursor: pointer;
  z-index: 50;
  color: #050810;
  border: none;
  transition: all 0.15s;
}
.fab:active {
  transform: scale(0.92);
  box-shadow: 0 4px 20px rgba(0, 212, 255, 0.6);
}

/* ═══════════════════════════════════════════════
   COMPONENT: 음식 입력 화면 (채팅형)
   ═══════════════════════════════════════════════ */
.food-input-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
}

.food-input-header {
  padding: 48px 20px 16px;
  border-bottom: 1px solid #0f1525;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-area {
  flex: 1;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 200px;
}

.chat-bot {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 18px 18px 18px 4px;
  padding: 12px 16px;
  max-width: 85%;
  color: white;
}
.chat-user {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px;
  max-width: 80%;
  margin-left: auto;
  color: white;
}

.food-analysis-card {
  background: #050810;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.food-analysis-card.not-found {
  border: 1px dashed #2a3550;
  background: rgba(251, 191, 36, 0.05);
}

.meal-select-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.meal-select-btn {
  padding: 10px;
  border-radius: 12px;
  background: #0f1525;
  border: 1px solid #1a2540;
  color: white;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.meal-select-btn:active {
  background: #00d4ff;
  color: #050810;
  transform: scale(0.97);
}

.food-input-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #050810;
  border-top: 1px solid #1a2540;
  padding: 16px 20px 32px;
  z-index: 50;
}

.preset-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-bottom: 12px;
  padding-bottom: 4px;
}
.preset-chip {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 9999px;
  padding: 8px 14px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #b0b8d0;
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.preset-chip:active {
  background: rgba(0, 212, 255, 0.15);
  border-color: #00d4ff;
}

.chat-input-bar {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 20px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-input-bar input {
  flex: 1;
  background: transparent;
  outline: none;
  border: none;
  color: white;
  font-size: 14px;
  font-family: inherit;
}
.chat-input-bar input::placeholder {
  color: #6b7a99;
}
.chat-send-btn {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #00d4ff;
  color: #050810;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  cursor: pointer;
}
.chat-send-btn:disabled {
  background: #1a2540;
  color: #6b7a99;
  cursor: not-allowed;
}

/* 손코딩 입력 모달 */
.manual-input-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 200;
  display: flex;
  align-items: flex-end;
}
.manual-input-sheet {
  width: 100%;
  background: #0f1525;
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  padding: 16px 20px 32px;
  animation: slideUp 0.25s ease-out;
}

.input-field {
  width: 100%;
  background: #050810;
  border: 1px solid #1a2540;
  border-radius: 12px;
  padding: 14px 16px;
  color: white;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}
.input-field:focus {
  border-color: #00d4ff;
}

/* 로딩 스피너 */
.loading-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(0, 212, 255, 0.2);
  border-top-color: #00d4ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ═══════════════════════════════════════════════
   COMPONENT: 더보기 화면
   ═══════════════════════════════════════════════ */
.more-profile-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 24px;
  padding: 20px;
}
.avatar-box {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #00d4ff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.05em;
}

.coach-chat-card {
  background: linear-gradient(135deg, rgba(0,212,255,0.18) 0%, rgba(0,212,255,0.04) 100%);
  border: 1px solid rgba(0, 212, 255, 0.5);
  border-radius: 24px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
}
.coach-chat-card:active { transform: scale(0.98); }
.coach-chat-icon {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: #00d4ff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #050810;

}

.section-group {

  border-radius: 16px;
  border: 1px solid #1a2540;
  overflow: hidden;
}
.menu-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid #1a2540;

  transition: background 0.15s;
}
.menu-row:last-child { border-bottom: none; }
.menu-row:active { background: #1a2540; }
.menu-icon-sm {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  background: #1a2540;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: #b0b8d0;
}
.menu-icon-sm.accent-bg-soft {
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.4);
  color: #00d4ff;
}
.menu-icon-sm.danger-bg-soft {
  background: rgba(239, 68, 68, 0.12);
  color: #ef4444;
}
.menu-row-content {
  flex: 1;
}
.menu-arrow {
  color: #4a5568;
  flex-shrink: 0;
}

.section-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  padding-left: 4px;
}

.toggle-switch-sm {
  position: relative;
  width: 40px;
  height: 22px;
  background: #1a2540;
  border-radius: 9999px;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-switch-sm.on { background: #00d4ff; }
.toggle-knob-sm {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch-sm.on .toggle-knob-sm {
  transform: translateX(18px);
  background: #050810;
}

.app-footer {
  text-align: center;
  padding: 24px 0;
}
.app-footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.05em;
  color: #00d4ff;
}

/* API 키 입력 모달 */
.api-key-input {
  width: 100%;
  background: #050810;
  border: 1px solid #1a2540;
  border-radius: 12px;
  padding: 14px 16px;
  color: white;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
}
.api-key-input:focus { border-color: #00d4ff; }

.api-status-badge {
  padding: 6px 12px;
  border-radius: 9999px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.api-status-badge.active {
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff;
  border: 1px solid rgba(0, 212, 255, 0.4);
}
.api-status-badge.inactive {
  background: rgba(107, 122, 153, 0.12);
  color: #6b7a99;
  border: 1px solid #1a2540;
}

.btn-danger {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #ef4444;
  padding: 12px;
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
}
.btn-danger:active { transform: scale(0.98); }

/* ═══════════════════════════════════════════════
   COMPONENT: 기록 화면 (STATS)
   ═══════════════════════════════════════════════ */
.period-tab {
  padding: 8px 16px;
  border-radius: 9999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: #6b7a99;
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}
.period-tab.active {
  background: rgba(0, 212, 255, 0.12);
  color: #00d4ff;
  border-color: rgba(0, 212, 255, 0.4);
}

.stat-mini-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 16px;
}
.stat-mini-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.stat-mini-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 0.05em;
}
.stat-mini-unit {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
}
.stat-mini-change {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* 토글 (체중/체지방) */
.chart-toggle {
  display: inline-flex;
  gap: 2px;
  background: #050810;
  padding: 2px;
  border-radius: 8px;
  border: 1px solid #1a2540;
}
.chart-toggle-btn {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #6b7a99;
  cursor: pointer;
  background: transparent;
  border: none;
}
.chart-toggle-btn.active {
  background: rgba(0, 212, 255, 0.15);
  color: #00d4ff;
}

/* 차트 컨테이너 */
.chart-container {
  height: 140px;
  position: relative;
}
.chart-y-labels {
  position: absolute;
  left: -4px;
  top: 0;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #4a5568;
}
.chart-x-labels {
  position: absolute;
  left: 28px;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #4a5568;
}
.chart-grid-line {
  border-top: 1px dashed #1a2540;
  height: 1px;
}

/* 막대 그래프 */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  padding: 0 8px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.bar-shape {
  background: #1a2540;
  border-radius: 4px 4px 0 0;
  width: 100%;
  transition: all 0.3s ease;
}
.bar-shape.active {
  background: #00d4ff;
  box-shadow: 0 -2px 12px rgba(0, 212, 255, 0.4);
}
.bar-shape.partial {
  background: linear-gradient(to top, rgba(0, 212, 255, 0.5) 0%, rgba(0, 212, 255, 0.25) 100%);
}
.bar-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #4a5568;
}
.bar-value {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #d6d3d1;
}

/* PR 히스토리 아이템 */
.pr-history-item {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: 14px;
  padding: 14px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 코치 채팅 화면
   ═══════════════════════════════════════════════ */
.coach-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
}
.coach-header {
  padding: 48px 20px 16px;
  border-bottom: 1px solid #0f1525;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #050810;
  position: sticky;
  top: 0;
  z-index: 10;
}
.coach-header-info {
  flex: 1;
  display: flex;
  align-items: center;

}
.coach-avatar {
  width: 36px;

  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  flex-shrink: 0;
}
.coach-online-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 6px #00d4ff;
  display: inline-block;
}
.coach-chat-area {
  flex: 1;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 120px;
}
.coach-msg-bot {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.2);

}
.coach-msg-bot p {

}
.coach-msg-bot .msg-content strong {

}
.coach-msg-bot .msg-content em {

}
.coach-msg-bot .msg-content code {

}
.coach-msg-user {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px;
  max-width: 80%;
  margin-left: auto;
  color: white;
}
.coach-quick-questions {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 0 8px 0;

}
.coach-quick-chip {
  background: #0f1525;
  border: 1px solid #1a2540;

.coach-input-bottom {

.coach-api-required {
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.3);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0;
}

/* ═══════════════════════════════════════════════
   COMPONENT: AI 추천 카드
   ═══════════════════════════════════════════════ */
.ai-rec-card {
  background: linear-gradient(135deg, #0a1530 0%, #0f1525 100%);

}

}
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #00d4ff;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 9999px;
  background: rgba(0, 212, 255, 0.15);
  border: 1px solid rgba(0, 212, 255, 0.4);
}
.ai-rec-reason {
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;

}
.ai-rec-caution {
  background: rgba(251, 191, 36, 0.08);

  margin-top: 10px;
}
.ai-rec-suggestion {
  background: rgba(0, 212, 255, 0.06);

  border-radius: 12px;
  padding: 10px 14px;
  margin-top: 10px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 주간 리뷰 + 정체기 카드
   ═══════════════════════════════════════════════ */
.weekly-review-card {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 212, 255, 0.03) 100%);
  border: 1px solid rgba(0, 212, 255, 0.5);
  border-radius: 24px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.weekly-review-card:active { transform: scale(0.99); }
.weekly-review-card::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -20%;
  width: 60%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
  pointer-events: none;
}

.plateau-card {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.1) 0%, rgba(251, 191, 36, 0.02) 100%);
  border: 1px solid rgba(251, 191, 36, 0.4);
  border-radius: 24px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.plateau-card:active { transform: scale(0.99); }

.review-detail-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: #050810;
  padding-bottom: 40px;
}
.review-section {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 18px;
  padding: 16px 18px;
  margin-bottom: 12px;
}
.review-section.highlight {
  background: rgba(0, 212, 255, 0.06);
  border-color: rgba(0, 212, 255, 0.3);
}
.review-section.warning {
  background: rgba(251, 191, 36, 0.06);
  border-color: rgba(251, 191, 36, 0.3);
}
.review-bullet {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.55;
  color: #d6d3d1;
}
.review-bullet:last-child { margin-bottom: 0; }
.review-bullet-dot {
  flex-shrink: 0;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  margin-top: 8px;
}

/* ═══════════════════════════════════════════════
   COMPONENT: 운동 마법사 (STEP 1 부위 선택)
   ═══════════════════════════════════════════════ */

/* 스텝 인디케이터 */
.step-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
}
.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #1a2540;
  transition: all 0.2s;
}
.step-dot.active {
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
}
.step-dot.completed {
  background: rgba(0, 212, 255, 0.4);
}
.step-line {
  flex: 1;
  height: 1px;
  background: #1a2540;
}
.step-line.active { background: rgba(0, 212, 255, 0.4); }

/* 주간 기록 - 7일 막대그래프 */
.weekly-bars-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 20px;
}
.weekly-bars-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.weekly-bars-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  align-items: end;
  height: 80px;
}
.day-bar-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  height: 100%;
}
.day-bar-shape {
  width: 100%;
  background: #1a2540;
  border-radius: 4px 4px 0 0;
  transition: all 0.3s;
  position: relative;
  min-height: 6px;
}
.day-bar-shape.push { background: linear-gradient(to top, #00d4ff, #00d4ff80); }
.day-bar-shape.pull { background: linear-gradient(to top, #a78bfa, #a78bfa80); }
.day-bar-shape.legs { background: linear-gradient(to top, #fbbf24, #fbbf2480); }
.day-bar-shape.free { background: linear-gradient(to top, #6b7a99, #6b7a9980); }
.day-bar-shape.today {
  outline: 2px solid #00d4ff;
  outline-offset: 1px;
}
.day-bar-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-align: center;
}
.day-bar-label.today { color: #00d4ff; font-weight: 700; }

.weekly-legend {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #1a2540;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #b0b8d0;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* 부위 선택 카드 (큰 버튼) */
.body-part-card {
  background: #0f1525;
  border: 1px solid #1a2540;
  border-radius: 24px;
  padding: 22px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.body-part-card:active { transform: scale(0.985); }
.body-part-card:hover {
  border-color: rgba(0, 212, 255, 0.3);
}

.body-part-card.recommended {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0.04) 100%);
  border: 1px solid rgba(0, 212, 255, 0.5);
}
.body-part-card.recommended::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 50%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.body-part-card.completed {
  opacity: 0.65;
}

.body-part-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  position: relative;
}

.body-part-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.body-part-name.recommended { color: #00d4ff; }

.body-part-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

.body-part-count {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.body-part-count-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: #b0b8d0;
}
.body-part-count-num.zero { color: #fbbf24; }
.body-part-count-num.done { color: #00d4ff; }
.body-part-count-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.body-part-desc {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: #6b7a99;
  position: relative;
}

.recommend-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(0, 212, 255, 0.2);
  border: 1px solid rgba(0, 212, 255, 0.5);
  color: #00d4ff;
  padding: 3px 9px;
  border-radius: 9999px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  margin-bottom: 8px;
  position: relative;
}

/* ═══════════════════════════════════════════════
   COMPONENT: STEP 2 - 루틴 분석 결과
   ═══════════════════════════════════════════════ */

/* AI 분석 헤더 카드 */
.routine-analysis-card {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(0, 212, 255, 0.02) 100%);
  border: 1px solid rgba(0, 212, 255, 0.4);
  border-radius: 24px;
  padding: 22px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.routine-analysis-card::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 50%;
  height: 160%;
  background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.routine-meta-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(0, 212, 255, 0.2);
  position: relative;

function fmtDate(d) {
  if (!d) d = new Date();
  var dt = new Date(d);
  return dt.getFullYear() + '.' + String(dt.getMonth()+1).padStart(2,'0') + '.' + String(dt.getDate()).padStart(2,'0');

function daysAgo(dateStr) {
  var d = new Date(dateStr);
  var t = new Date();
  t.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  var diff = Math.floor((t - d) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return diff + '일 전';
  if (diff < 30) return Math.floor(diff/7) + '주 전';
  return Math.floor(diff/30) + '개월 전';
}

function icon(name, size) {
  if (!size) size = 22;
  var svg = ICONS[name];
  return svg.replace('<svg ', '<svg width="' + size + '" height="' + size + '" ');
}

// ═══════════════════════════════════════════════
// 홈 화면 렌더
// ═══════════════════════════════════════════════
function renderHome() {
  var profile = state.profile;
  var data = state.data;
  var today = new Date();
  var tdStr = getTodayStr();
  var dayOfWeek = today.getDay() || 7;
  var dayNames = ['일','월','화','수','목','금','토'];
  
  // 주간 리뷰 자동 로드 (백그라운드, 일요일)
  if (state.apiKey && !state.weeklyReview && !state.weeklyReviewLoading && shouldShowWeeklyReview()) {
    loadWeeklyReviewIfNeeded();
  }
  
  // 정체기 자동 체크 (백그라운드)
  if (state.apiKey && !state.plateauCheck && !state.plateauCheckLoading) {
    loadPlateauCheckIfNeeded();
  }
  
  var todayMeals = data.nutritionLog.filter(function(m) { return m.date === tdStr; });
  var todayProtein = todayMeals.reduce(function(s, m) { return s + m.protein; }, 0);
  var proteinPercent = Math.round((todayProtein / profile.proteinTarget) * 100);
  var proteinRemaining = Math.max(0, profile.proteinTarget - todayProtein);
  var thresholdPassed = todayMeals.filter(function(m) { return m.thresholdPassed; }).length;
  
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  
  var thisWeekWorkouts = data.workoutLog.filter(function(w) {
    var wd = new Date(w.date);
    return wd >= monday && wd <= today;
  });
  
  var weekDays = ['월','화','수','목','금','토','일'];
  var weekMap = {};
  thisWeekWorkouts.forEach(function(w) {
    var day = new Date(w.date).getDay();
    var idx = day === 0 ? 6 : day - 1;
    weekMap[idx] = w.sessionKr;
  });
  var todayDayIdx = dayOfWeek === 7 ? 6 : dayOfWeek - 1;
  var recentPRs = data.personalRecords.slice(0, 2);
  
  // 7주 도트
  var weekDots = '';
  for (var i = 0; i < 7; i++) {
    weekDots += '<div class="dot ' + (i === profile.currentWeek - 1 ? 'dot-ideal' : 'dot-pending') + '"></div>';
    if (i < 6) weekDots += '<div class="flex-1 h-px bg-stone-800"></div>';
  }
  
  // 끼니별
  var meals = '';
  ['아침','점심','저녁','간식'].forEach(function(meal, idx) {
    var key = ['breakfast','lunch','dinner','snack'][idx];
    var m = todayMeals.find(function(x) { return x.meal === key; });
    var passed = m && m.thresholdPassed;
    meals += '<div class="text-center">' +
      '<div class="flex justify-center mb-1\\.5"><div class="dot ' + (passed ? 'dot-passed' : 'dot-pending') + '"></div></div>' +
      '<p class="text-[10px] font-mono text-stone-400">' + meal + '</p>' +
      '<p class="text-[11px] font-mono text-stone-300 mt-0\\.5">' + (m ? m.protein + 'g' : '—') + '</p>' +
    '</div>';
  });
  
  // 주간 요일 박스
  var weekBoxes = '';
  weekDays.forEach(function(day, idx) {
    var completed = weekMap[idx];
    var isToday = idx === todayDayIdx;
    var boxClass = completed ? 'day-box-done' : (isToday ? 'day-box-today' : 'day-box-empty');
    var dayColor = isToday ? '#00d4ff' : '#6b7a99';
    
    weekBoxes += '<div class="text-center">' +
      '<div class="day-box ' + boxClass + '">' +
        (completed ? '<p class="text-[9px] font-display font-bold accent">' + completed + '</p>' : '') +
        (!completed && isToday ? '<div class="today-dot"></div>' : '') +
      '</div>' +
      '<p class="text-[9px] font-mono mt-1" style="color: ' + dayColor + '">' + day + '</p>' +
    '</div>';
  });
  
  // PR 카드
  var prCards = '';
  recentPRs.forEach(function(pr) {
    prCards += '<div class="pr-badge">' +
      '<div>' +
        '<p class="text-sm font-display font-bold">' + pr.exerciseName + '</p>' +
        '<p class="text-[10px] font-mono text-stone-500 mt-0\\.5">' + daysAgo(pr.date) + (pr.weight ? ' · ' + pr.reps + '회' : '') + '</p>' +
      '</div>' +
      '<div class="text-right">' +
        '<p class="font-bebas text-2xl accent">' + (pr.weight ? pr.weight : pr.reps) + '<span class="text-xs text-stone-500">' + (pr.weight ? 'kg' : '회') + '</span></p>' +
        '<p class="text-[10px] font-mono text-stone-500">' + (pr.weight && pr.previousWeight ? '+' + (pr.weight - pr.previousWeight).toFixed(1) + 'kg' : (pr.previousReps ? '+' + (pr.reps - pr.previousReps) + '회' : '')) + '</p>' +
      '</div>' +
    '</div>';
  });
  
  return '' +
    // 헤더
    '<div class="px-5 pt-12 pb-5">' +
      '<div class="flex items-center justify-between mb-3">' +
        '<p class="text-xs uppercase font-mono text-stone-500" style="letter-spacing: 0.3em;">' + fmtDate(today) + ' · ' + dayNames[today.getDay()] + '</p>' +
        '<div class="flex items-center gap-2">' +
          '<span class="status-dot animate-pulse"></span>' +
          '<p class="text-xs font-mono accent">CYCLE ' + profile.currentCycle + ' · WK ' + profile.currentWeek + '/7</p>' +
        '</div>' +
      '</div>' +
      '<h1 class="font-bebas text-4xl">홈</h1>' +
    '</div>' +
    
    '<div class="px-5 pb-32">' +
      
      // 사이클 카드
      '<div class="card-accent mb-4">' +
        '<div class="relative">' +
          '<div class="flex items-baseline justify-between mb-1">' +
            '<p class="text-xs uppercase tracking-widest text-stone-500 font-mono">현재 단계</p>' +
            '<p class="text-xs font-mono accent">' + profile.currentWeek + '주차 / 7</p>' +
          '</div>' +
          '<div class="flex items-end justify-between mb-4">' +
            '<h2 class="font-bebas text-4xl">' + profile.cyclePhase + '</h2>' +
            '<p class="text-xs text-stone-500 font-mono">가볍게 시작</p>' +
          '</div>' +
          '<div class="flex items-center gap-1\\.5">' + weekDots + '</div>' +
          '<div class="flex items-center justify-between mt-2">' +
            '<p class="text-[10px] text-stone-600 font-mono uppercase">적응</p>' +
            '<p class="text-[10px] text-stone-600 font-mono uppercase">구축</p>' +
            '<p class="text-[10px] text-stone-600 font-mono uppercase">강화</p>' +
            '<p class="text-[10px] text-stone-600 font-mono uppercase">디로드</p>' +
          '</div>' +
        '</div>' +
      '</div>' +
      
      // 단백질 카드
      '<div class="card mb-4">' +
        '<div class="flex items-baseline justify-between mb-4">' +
          '<div>' +
            '<p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-1">오늘 단백질</p>' +
            '<p class="font-bebas text-4xl">' + todayProtein + '<span class="text-xl text-stone-500">/' + profile.proteinTarget + 'g</span></p>' +
          '</div>' +
          '<div class="text-right">' +
            '<p class="text-xs text-stone-500 font-mono">남은 양</p>' +
            '<p class="font-bebas text-2xl accent">' + proteinRemaining + 'g</p>' +
          '</div>' +
        '</div>' +
        '<div class="progress-bg mb-4"><div class="progress-fill" style="width: ' + Math.min(100, proteinPercent) + '%"></div></div>' +
        '<div class="border-t pt-4">' +
          '<p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-3">끼니 분배 · 임계점 ' + thresholdPassed + '/4</p>' +
          '<div class="grid grid-cols-4 gap-2">' + meals + '</div>' +
        '</div>' +
      '</div>' +
      
      // 이번 주 운동
      '<div class="card mb-4">' +
        '<div class="flex items-baseline justify-between mb-4">' +
          '<div>' +
            '<p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-1">이번 주 운동</p>' +
            '<p class="font-bebas text-4xl">' + thisWeekWorkouts.length + '<span class="text-xl text-stone-500">회</span></p>' +
          '</div>' +
          '<div class="text-right">' +
            '<p class="text-xs text-stone-500 font-mono">목표</p>' +
            '<p class="text-sm font-display font-bold accent">주 ' + profile.workoutFreq + '회</p>' +
          '</div>' +
        '</div>' +
        '<div class="grid grid-cols-7 gap-1\\.5">' + weekBoxes + '</div>' +
        
        // 최근 운동 리스트 (있을 시)
        (thisWeekWorkouts.length > 0 ? 
          '<div style="margin-top: 16px; padding-top: 14px; border-top: 1px dashed #1a2540;">' +
            '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-2">최근 운동 (클릭하여 상세)</p>' +
            thisWeekWorkouts.slice(-3).reverse().map(function(w) {
              var d = new Date(w.date);
              var dStr = ['일','월','화','수','목','금','토'][d.getDay()];
              return '<div class="workout-history-row" onclick="openItemDetail(\'workout\', \'' + (w.startTime || w.id) + '\')">' +
                '<div class="flex items-center gap-3">' +
                  '<div class="workout-history-dot"></div>' +
                  '<div>' +
                    '<p class="text-xs font-display font-bold">' + (w.sessionKr || w.sessionName) + '</p>' +
                    '<p class="text-[10px] font-mono text-stone-500 mt-0\\.5">' + w.date.substring(5) + ' (' + dStr + ') · ' + (w.duration || 0) + '분 · ' + (w.sets || 0) + '세트</p>' +
                  '</div>' +
                '</div>' +
                '<div style="color: #6b7a99;">' + icon('chevron', 14) + '</div>' +
              '</div>';
            }).join('') +
          '</div>' : '') +
      '</div>' +
      
      // 주간 리뷰 카드 (일요일 또는 새 주차)
      (state.weeklyReview ? 
        '<div class="weekly-review-card mb-4" onclick="openWeeklyReview()">' +
          '<div class="relative">' +
            '<div class="flex items-center justify-between mb-2">' +
              '<span class="ai-badge">📊 주간 리뷰</span>' +
              '<p class="text-[10px] font-mono text-stone-500">' + state.weeklyReview.monday.substring(5) + ' ~ ' + state.weeklyReview.sunday.substring(5) + '</p>' +
            '</div>' +
            '<div class="flex items-baseline gap-3 mb-2">' +

// AI가 추천하는 오늘 세션 (이번 주에 안 한 것 중 우선)
function getRecommendedSession() {
  var today = new Date();
  var dayOfWeek = today.getDay() || 7;
  var monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek - 1));
  monday.setHours(0,0,0,0);
  
  var thisWeek = state.data.workoutLog.filter(function(w) {
    var wd = new Date(w.date);
    return wd >= monday && wd <= today;
  });
  
  var done = thisWeek.map(function(w) { return w.session || w.sessionKr.toLowerCase(); });
  
  // 우선순위: PUSH → PULL → LEGS → FREE
  var priority = ['push', 'pull', 'legs', 'free'];
  for (var i = 0; i < priority.length; i++) {
    if (done.indexOf(priority[i]) === -1) return priority[i];
  }
  return 'free';
}

// 양 단위 (정규식)
var AMOUNT_PATTERNS = [
  { regex: /(\d+\.?\d*)\s*g/, unit: 'g', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*ml/, unit: 'ml', multiplier: 1 },
  { regex: /(\d+)\s*개/, unit: '개', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*인분/, unit: '인분', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*그릇/, unit: '그릇', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*공기/, unit: '공기', multiplier: 1 },
  { regex: /(\d+)\s*줄/, unit: '줄', multiplier: 1 },
  { regex: /(\d+\.?\d*)\s*스쿱/, unit: '스쿱', multiplier: 1 },
  { regex: /(\d+)\s*팩/, unit: '팩', multiplier: 1 },
  { regex: /반\s*공기/, unit: '공기', multiplier: 0.5, fixed: true },
  { regex: /반\s*인분/, unit: '인분', multiplier: 0.5, fixed: true },
  { regex: /반\s*그릇/, unit: '그릇', multiplier: 0.5, fixed: true },
  { regex: /한\s*공기/, unit: '공기', multiplier: 1, fixed: true },
  { regex: /두\s*공기/, unit: '공기', multiplier: 2, fixed: true },
  { regex: /한\s*인분/, unit: '인분', multiplier: 1, fixed: true },
  { regex: /한\s*줌/, unit: 'g', multiplier: 20, fixed: true }
];

// 음식 이름 정규화 (공백 제거 등)
function normalizeFood(name) {
  return name.replace(/\s+/g, '');
}

// DB에서 음식 찾기
function findFoodInDB(name) {
  var norm = normalizeFood(name);
  
  // 1차: 직접 매칭
  if (FOOD_DB[norm]) return { key: norm, data: FOOD_DB[norm] };
  
  // 2차: 별칭 매칭
  if (FOOD_ALIASES[norm]) {
    var aliasKey = FOOD_ALIASES[norm];
    if (FOOD_DB[aliasKey]) return { key: aliasKey, data: FOOD_DB[aliasKey] };
  }
  
  // 3차: 부분 매칭 (포함 관계)
  var dbKeys = Object.keys(FOOD_DB);
  for (var i = 0; i < dbKeys.length; i++) {
    if (norm.indexOf(dbKeys[i]) !== -1 || dbKeys[i].indexOf(norm) !== -1) {
      return { key: dbKeys[i], data: FOOD_DB[dbKeys[i]] };
    }
  }
  
  // 4차: 별칭 부분 매칭
  var aliasKeys = Object.keys(FOOD_ALIASES);
  for (var i = 0; i < aliasKeys.length; i++) {
    if (norm.indexOf(aliasKeys[i]) !== -1) {
      var aliasKey = FOOD_ALIASES[aliasKeys[i]];
      if (FOOD_DB[aliasKey]) return { key: aliasKey, data: FOOD_DB[aliasKey] };
    }
  }
  
  return null;
}

// 양 추출
function extractAmount(text, defaultData) {
  for (var i = 0; i < AMOUNT_PATTERNS.length; i++) {
    var p = AMOUNT_PATTERNS[i];
    var match = text.match(p.regex);
    if (match) {
      var value;
      if (p.fixed) {
        value = p.multiplier;
      } else {
        value = parseFloat(match[1]) * p.multiplier;
      }
      return { amount: value, unit: p.unit, defaulted: false };
    }
  }
  return { amount: defaultData.defaultAmount, unit: defaultData.unit, defaulted: true };
}

// 음식 분석 (자연어 → 영양소)
function analyzeFood(text) {
  // 음식 이름 찾기
  var found = findFoodInDB(text);
  if (!found) return null;
  
  // 양 추출
  var amountInfo = extractAmount(text, found.data);
  
  // 단위 변환
  var multiplier;
  var data = found.data;
  
  if (amountInfo.unit === data.unit) {
    multiplier = amountInfo.amount / data.defaultAmount;
  } else if (amountInfo.unit === 'g' && data.unit === 'g') {
    multiplier = amountInfo.amount / 100;
  } else {
    multiplier = amountInfo.amount / data.defaultAmount;
  }
  
  // 무게 단위인 경우 100g 기준이라는 가정
  if (data.unit === 'g' && data.defaultAmount === 100) {
    multiplier = amountInfo.amount / 100;
  }
  
  // 표시용 양 텍스트
  var amountText;
  if (amountInfo.unit === 'g' || amountInfo.unit === 'ml') {
    amountText = amountInfo.amount + amountInfo.unit;
  } else {
    amountText = amountInfo.amount + amountInfo.unit;
  }
  
  return {
    name: found.key,
    amount: amountText,
    rawAmount: amountInfo.amount,
    unit: amountInfo.unit,
    defaulted: amountInfo.defaulted,
    protein: Math.round(data.p * multiplier * 10) / 10,
    kcal: Math.round(data.kcal * multiplier),
    carbs: Math.round(data.c * multiplier * 10) / 10,
    fat: Math.round(data.f * multiplier * 10) / 10
  };
}

// 여러 음식 입력 처리 ("닭가슴살 100g + 밥 한 공기")
function analyzeFoodInput(text) {
  // 분리자: 와, 랑, +, 하고, 그리고
  var parts = text.split(/\s*(?:와|랑|이랑|\+|하고|그리고|,)\s*/);
  
  var results = [];
  var unmatched = [];
  
  parts.forEach(function(part) {
    if (!part.trim()) return;
    var result = analyzeFood(part.trim());
    if (result) {
      results.push(result);
    } else {
      unmatched.push(part.trim());
    }
  });
  
  return { matched: results, unmatched: unmatched };
}

// Haiku API 호출 (DB 매칭 실패 시)
// ═══════════════════════════════════════════════
async function analyzeFoodWithAI(text) {
  var apiKey = state.apiKey;
  if (!apiKey) return null;
  
  var systemPrompt = '당신은 한국 음식 영양 분석 전문가입니다. 사용자가 입력한 음식의 단백질(g), 칼로리(kcal), 탄수화물(g), 지방(g)을 분석해 JSON으로만 응답하세요. 양이 명시되지 않으면 일반적인 1인분 기준. 한국 음식과 양 단위(인분, 그릇, 공기, 줌 등)에 익숙합니다. 응답은 반드시 다음 형식의 JSON만 포함하세요:\n{"foods": [{"name": "음식명", "amount": "양 표시(예: 100g)", "protein": 숫자, "kcal": 숫자, "carbs": 숫자, "fat": 숫자}]}\n\n여러 음식이 있으면 foods 배열에 각각 분리. 추가 설명 금지, JSON만 출력.';
  
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1024,
        system: systemPrompt,
        messages: [
          { role: 'user', content: text }
        ]
      })
    });
    
    if (!response.ok) {
      var errorText = await response.text();
      console.error('API error:', response.status, errorText);
      return { error: 'API 오류 (' + response.status + ')', detail: errorText };
    }
    
    var data = await response.json();
    if (!data || !Array.isArray(data.content) || data.content.length === 0 || !data.content[0].text) {
      return { error: 'AI 응답이 비어있어요. 다시 시도해주세요.' };
    }
    var content = data.content[0].text;
    
    // JSON 추출 (```json 블록 제거)
    var cleaned = content.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch (e) {
      // JSON 추출 시도 (텍스트 중간에 JSON이 있을 경우)
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) {
        parsed = JSON.parse(match[0]);
      } else {
        throw e;
      }
    }
    
    if (!parsed.foods || !Array.isArray(parsed.foods)) {
      return { error: '응답 형식 오류' };
    }
    
    // 형식 정규화
    return {
      foods: parsed.foods.map(function(f) {
        return {
          name: f.name || '음식',
          amount: f.amount || '1인분',

// 운동 이름 → GIF URL 매칭 (정확 일치 실패 시 토큰 기반 fuzzy 매칭)
// AI가 "머신 시티드 숄더 프레스" 같은 변형 이름을 만들어도 "숄더 프레스 머신" 키와 매칭되도록.
function findExerciseGif(name) {
  if (!name) return null;
  if (EXERCISE_GIFS[name]) return EXERCISE_GIFS[name];

  var stripSpace = function(s) { return s.replace(/\s+/g, ''); };
  var nameNoSpace = stripSpace(name);
  var keys = Object.keys(EXERCISE_GIFS);

  // 1) 공백 무시 완전 일치
  for (var i = 0; i < keys.length; i++) {
    if (stripSpace(keys[i]) === nameNoSpace) return EXERCISE_GIFS[keys[i]];
  }

  // 2) 토큰 기반: 매핑 키의 모든 토큰이 운동 이름에 (순서 무관) 모두 존재
  var nameTokens = name.split(/\s+/).filter(Boolean);
  var best = null;
  for (var j = 0; j < keys.length; j++) {
    var keyTokens = keys[j].split(/\s+/).filter(Boolean);
    var allFound = keyTokens.every(function(kt) {
      return nameTokens.indexOf(kt) !== -1;
    });
    if (allFound) {
      // 더 많은 토큰이 일치 = 더 구체적
      if (!best || keyTokens.length > best.tokens) {
        best = { key: keys[j], tokens: keyTokens.length };
      }
    }
  }

  if (!best) {
    console.log('[GIF] 매칭 실패:', name);
    return null;
  }
  return EXERCISE_GIFS[best.key];
}

// Epley 공식: 1RM = 무게 × (1 + 횟수/30)
function calculate1RM(weight, reps) {
  if (!weight || !reps) return 0;
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30) * 10) / 10;
}

// 종목명으로 1RM 조회 (별칭 자동 처리)
function get1RM(exerciseName) {
  var data = storage.get(KEYS.ONE_RM_DATA, {});
  
  // 1. 직접 매칭
  if (data[exerciseName] !== undefined) return data[exerciseName];
  
  // 2. 별칭 매칭
  var aliased = EXERCISE_ALIASES_1RM[exerciseName];
  if (aliased && data[aliased] !== undefined) return data[aliased];
  
  // 3. 역방향 별칭 매칭
  var keys = Object.keys(EXERCISE_ALIASES_1RM);
  for (var i = 0; i < keys.length; i++) {
    if (EXERCISE_ALIASES_1RM[keys[i]] === exerciseName && data[keys[i]] !== undefined) {
      return data[keys[i]];
    }
  }
  
  return null;
}

// 1RM 갱신 (더 높으면)
function update1RM(exerciseName, weight, reps) {
  if (!weight || !reps) return false;
  
  var newRM = calculate1RM(weight, reps);
  var currentRM = get1RM(exerciseName);
  
  if (currentRM !== null && newRM <= currentRM) return false;
  
  var data = storage.get(KEYS.ONE_RM_DATA, {});
  
  // 별칭 우선
  var key = EXERCISE_ALIASES_1RM[exerciseName] || exerciseName;
  data[key] = newRM;
  
  storage.set(KEYS.ONE_RM_DATA, data);
  return true; // 갱신됨
}

// 작업 무게 추천 (1RM의 N%)
function suggestWorkingWeight(exerciseName, percentage) {
  var rm = get1RM(exerciseName);
  if (!rm) return null;
  
  var pct = percentage || 0.7; // 기본 70%
  var weight = rm * pct;
  
  // 머신/덤벨에 따라 반올림
  // 덤벨: 0.5kg 단위, 머신: 2.5kg 단위 (간단히 둘 다 2.5kg)
  return Math.round(weight / 2.5) * 2.5;
}

// 1RM 없는 종목에 대해 같은 부위 종목의 1RM 평균으로 추정
// 안전장치: 표본 2개 이상에서만 추정 (표본 1개 = 변동성 너무 큼)
function estimate1RMFromPart(exerciseName) {
  // 이미 1RM 있으면 그거 사용
  var direct = get1RM(exerciseName);
  if (direct) return { weight: direct, source: 'direct', confidence: 'high' };
  
  var info = getExercisePart(exerciseName);
  if (!info) return null;
  
  var oneRMData = storage.get(KEYS.ONE_RM_DATA, {});
  var samePartRMs = [];
  
  Object.keys(EXERCISE_BODY_PART_MAP).forEach(function(name) {
    if (name === exerciseName) return;
    var otherInfo = EXERCISE_BODY_PART_MAP[name];
    if (otherInfo.primary !== info.primary) return;
    if (otherInfo.compound !== info.compound) return;
    var rm = oneRMData[name];
    if (rm) samePartRMs.push(rm);
  });
  
  if (samePartRMs.length === 0) return null;
  
  // 안전: 표본 1개는 신뢰도 낮음 → confidence: low로 표시 (시스템 프롬프트에서 활용 제한)
  var confidence = samePartRMs.length >= 3 ? 'medium' : (samePartRMs.length >= 2 ? 'low' : 'very_low');
  
  // 평균 × 0.85 (다른 종목이므로 보수적으로)
  var avg = samePartRMs.reduce(function(s, r) { return s + r; }, 0) / samePartRMs.length;
  var estimated = Math.round(avg * 0.85 / 2.5) * 2.5;
  
  return { 
    weight: estimated, 
    source: 'estimated_from_part', 
    basedOn: samePartRMs.length + '개 종목 평균',
    confidence: confidence
  };
}

// 1RM 초기화 (첫 실행)

  var alreadyInit = storage.get(KEYS.ONE_RM_INITIALIZED);
  if (alreadyInit) return;

  var data = {};
  Object.keys(INITIAL_1RM).forEach(function(key) {
    data[key] = INITIAL_1RM[key];
  });
  
  storage.set(KEYS.ONE_RM_DATA, data);
  storage.set(KEYS.ONE_RM_INITIALIZED, true);
}

    var isToday = dayStr === todayStr;
    var isFuture = dayDate > today;
    
    // 해당 날짜의 운동
    var dayWorkouts = thisWeek.filter(function(w) { return w.date === dayStr; });
    
    var barHtml;
    if (dayWorkouts.length > 0) {
      var w = dayWorkouts[0];
      var part = w.sessionKr ? w.sessionKr.toLowerCase() : 'free';
      var heightPct = Math.min(90, 50 + (w.duration || 60) / 2);
      barHtml = '<div class="day-bar-shape ' + part + (isToday ? ' today' : '') + '" style="height: ' + heightPct + '%;"></div>';
    } else {
      var height = isFuture ? 6 : 8;
      barHtml = '<div class="day-bar-shape' + (isToday ? ' today' : '') + '" style="height: ' + height + 'px;"></div>';
    }
    
    dayBarsHtml += 
      '<div class="day-bar-col">' +
        barHtml +
        '<p class="day-bar-label' + (isToday ? ' today' : '') + '">' + dayLabels[d] + '</p>' +
      '</div>';
  }
  
  // 부위 카드 생성 헬퍼
  function partCard(key, name, koreanName, desc, count) {
    var isRecommended = key === recommended;
    var cardClass = 'body-part-card' + (isRecommended ? ' recommended' : '') + (count >= 2 ? ' completed' : '');

      '<div class="body-part-header">' +

        '</div>' +
      '</div>' +
      '<p class="body-part-desc">' + koreanName + ' · ' + desc + '</p>' +
    '</div>';
  }
  
  return '' +
    // 헤더

    '<div class="px-5 pb-32">' +
      
      // 스텝 인디케이터
      '<div class="step-indicator">' +
        '<div class="step-dot active"></div>' +
        '<div class="step-line"></div>' +
        '<div class="step-dot"></div>' +
        '<div class="step-line"></div>' +
        '<div class="step-dot"></div>' +
        '<p class="text-[10px] font-mono accent ml-2">STEP 1 · 부위 선택</p>' +
      '</div>' +
      
      // 주간 기록 (7일 막대)

        '<div class="weekly-bars-header">' +
          '<div>' +
            '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-1">이번 주 기록</p>' +
            '<p class="font-bebas text-2xl">' + thisWeek.length + '<span class="text-sm text-stone-500"> / ' + state.profile.workoutFreq + '회</span></p>' +
          '</div>' +
          '<div class="text-right">' +
            '<p class="text-[10px] font-mono text-stone-500 uppercase tracking-widest mb-1">목표 달성</p>' +
            '<p class="font-bebas text-2xl accent">' + Math.round((thisWeek.length / state.profile.workoutFreq) * 100) + '<span class="text-sm text-stone-500">%</span></p>' +

        '</div>' +
        '<div class="weekly-bars-grid">' + dayBarsHtml + '</div>' +
        '<div class="weekly-legend">' +
          '<div class="legend-item"><div class="legend-dot" style="background: #00d4ff;"></div>PUSH</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #a78bfa;"></div>PULL</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #fbbf24;"></div>LEGS</div>' +
          '<div class="legend-item"><div class="legend-dot" style="background: #6b7a99;"></div>FREE</div>' +

      partCard('free', 'FREE', '자유 구성', '직접 종목 선택', freeCount) +
      
    '</div>';
}

window.selectBodyPart = async function(part) {
  state.selectedBodyPart = part;
  state.generatedRoutine = null;
  
  // FREE는 STEP 3 (대화형)로 바로 이동 — 빈 루틴부터 대화로 채워감
  if (part === 'free') {
    state.workoutWizardStep = 3;
    state.routineLoading = false;
    state.routineChatHistory = [];
    state.routineChatInput = '';
    state.routinePreviewExpanded = false;
    
    // 빈 루틴 초기화
    state.generatedRoutine = {
      bodyPart: 'free',
      headline: '자유 루틴 구성 중',
      duration: 60,
      totalSets: 0,
      intensity: 'moderate',
      caution: '',
      exercises: [],
      isFree: true
    };
    
    // AI 첫 메시지
    state.routineChatHistory = [
      {
        role: 'assistant',
        content: '오늘 어떤 운동을 하고 싶으세요? 자유롭게 말씀해주세요.\n\n예를 들어:\n· "어깨 위주로 30분만"\n· "가슴 + 이두 같이"\n· "오늘은 가볍게 풀바디"\n· "1RM의 70% 정도로 6종목"\n\n원하는 부위, 시간, 강도를 알려주시면 루틴을 제안할게요. [✓ 적용하기] 버튼으로 반영됩니다.'
      }
    ];

    saveWizard();
    render();
    setTimeout(function() {
      var input = document.getElementById('rc-input');
      if (input) input.focus();
    }, 100);
    return;
  }
  
  // 정형 (PUSH/PULL/LEGS): STEP 2 → AI 루틴 생성
  state.workoutWizardStep = 2;
  state.routineLoading = true;
  saveWizard();
  render();
  
  if (!state.apiKey) {
    // API 키 없을 시 폴백 (SESSIONS에서 가져오기)
    var fallback = SESSIONS[part];
    state.generatedRoutine = {
      bodyPart: part,
      headline: fallback.description,
      reason: 'API 키가 설정되지 않아 기본 루틴을 표시합니다. 더보기에서 키를 설정하면 AI가 1RM 기반으로 맞춤 루틴을 만들어줍니다.',
      duration: fallback.duration,
      totalSets: fallback.setCount,
      intensity: 'moderate',
      caution: '',
      exercises: fallback.exercises.map(function(ex) {
        return {
          name: ex.name,
          type: ex.type,
          isMain: false,
          sets: ex.sets,
          reps: ex.reps,
          weight: ex.lastWeight,
          rir: 2,
          note: ''
        };
      }),
      isFallback: true
    };
    state.routineLoading = false;
    saveWizard();
    render();
    return;
  }

  // AI 루틴 생성
  var routine = await generateFullRoutine(part);

  if (routine && !routine.error) {
    state.generatedRoutine = routine;
  } else {
    state.generatedRoutine = {
      error: routine ? routine.error : '루틴 생성 실패',
      bodyPart: part
    };
  }

  state.routineLoading = false;
  saveWizard();
  render();
};
