<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Exercises API</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', sans-serif; background: #050810; color: white; min-height: 100vh; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .accent { color: #00d4ff; }
</style>
</head>
<body class="flex items-center justify-center p-6">
  <div class="max-w-md w-full text-center">
    <div class="inline-flex items-center gap-2 mb-6">
      <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse"></div>
      <span class="text-xs font-mono uppercase tracking-widest text-stone-500">API STATUS</span>
    </div>
    
    <h1 class="font-bebas text-6xl mb-2">FITNESS API</h1>
    <p class="font-mono text-sm accent mb-8">● Online</p>
    
    <div class="bg-stone-900 border border-stone-800 rounded-2xl p-6 text-left space-y-4">
      <div>
        <p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-1">Total Exercises</p>
        <p class="font-bebas text-3xl">940</p>
      </div>
      
      <div class="border-t border-stone-800 pt-4">
        <p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-2">Endpoints</p>
        <a href="/exercises.json" class="block bg-black border border-stone-700 rounded-lg p-3 font-mono text-xs accent hover:bg-stone-900 transition">
          GET /exercises.json
        </a>
      </div>
      
      <div class="border-t border-stone-800 pt-4">
        <p class="text-xs uppercase tracking-widest text-stone-500 font-mono mb-2">Categories</p>
        <div class="grid grid-cols-2 gap-2 text-xs font-mono">
          <div class="flex justify-between"><span class="text-stone-400">PUSH</span><span class="accent">331</span></div>
          <div class="flex justify-between"><span class="text-stone-400">PULL</span><span class="accent">293</span></div>
          <div class="flex justify-between"><span class="text-stone-400">LEGS</span><span class="accent">189</span></div>
          <div class="flex justify-between"><span class="text-stone-400">CORE</span><span class="accent">127</span></div>
        </div>
      </div>
    </div>
    
    <p class="text-xs text-stone-600 font-mono mt-6">Personal fitness tracker · Private use</p>
  </div>
</body>
</html>
